            onMouseDown(e) {
                const point = this.screenToWorld(e.clientX, e.clientY);
                
                if (e.button === 0) { // Left click
                    if (this.mode === 'wall') {
                        this.isDrawing = true;
                        // If alignment guide is active, use the hover point; otherwise snap to endpoints
                        const snappedStart = this.alignmentGuide ? this.hoverPoint : this.snapToWallEndpoint(point);
                        this.currentWall = {
                            start: snappedStart,
                            end: snappedStart
                        };
                        // Clear alignment guide once used
                        this.alignmentGuide = null;
                    } else if (this.mode === 'path') {
                        this.isDrawingPath = true;
                        // Start from last end point if continuing, otherwise start fresh
                        const startPoint = this.lastPathEnd || point;
                        this.currentPath = {
                            start: startPoint,
                            end: startPoint
                        };
                    } else if (this.mode === 'door' || this.mode === 'window' || this.mode === 'furniture' || this.mode === 'safety') {
                        // Place asset
                        this.placeAsset(point);
                    } else if (this.mode === 'text') {
                        // Place text
                        this.placeText(point);
                    } else if (this.mode === 'ruler') {
                        // Begin a ruler/annotation. Hold Shift while moving to
                        // constrain to 0/45/90/135° angles via snapPoint().
                        this.isDrawingRuler = true;
                        this.currentRuler = {
                            start: { x: point.x, y: point.y },
                            end: { x: point.x, y: point.y }
                        };
                    } else if (this.mode === 'select') {
                        // Check if clicking rotation handle first
                        if (this.selectedAsset && this.isPointOnRotationHandle(point, this.selectedAsset)) {
                            this.isRotating = true;
                            this.rotationCenter = { x: this.selectedAsset.x, y: this.selectedAsset.y };
                            // Don't deselect, don't drag, just rotate
                            return;
                        }
                        
                        // Check if clicking on wall anchor points (if wall is selected)
                        if (this.selectedWall) {
                            if (this.isPointOnWallAnchor(point, this.selectedWall, 'start')) {
                                this.isDraggingWallStart = true;
                                return;
                            } else if (this.isPointOnWallAnchor(point, this.selectedWall, 'end')) {
                                this.isDraggingWallEnd = true;
                                return;
                            } else if (this.isPointOnWallAnchor(point, this.selectedWall, 'mid')) {
                                this.isDraggingWallMid = true;
                                return;
                            }
                        }
                        
                        // Check if clicking on text first
                        const clickedText = this.getTextAtPoint(point);
                        if (clickedText) {
                            this.selectedText = clickedText;
                            this.selectedAsset = null;
                            this.selectedAssets = [];
                            this.selectedWall = null;
                            this.selectedPathSegment = null;
                            // Store mouse position for potential drag
                            this.textClickPosition = { x: point.x, y: point.y };
                            this.textClickTime = Date.now();
                            this.dragOffset = {
                                x: point.x - clickedText.x,
                                y: point.y - clickedText.y
                            };
                            this.hidePropertyEditor();
                            this.showTextPropertiesPanel(e.clientX, e.clientY);
                            this.updateDeleteButton();
                            this.render();
                            return;
                        }
                        
                        // Check if clicking on an asset
                        const clickedAsset = this.getAssetAtPoint(point);
                        if (clickedAsset) {
                            // Check if Ctrl is held for multi-selection
                            if (e.ctrlKey) {
                                // Multi-selection mode: toggle the clicked asset in/out of the
                                // selection set. Promote any existing single selection into the
                                // set first so it isn't lost when going from single -> multi.
                                if (this.selectedAsset && !this.selectedAssets.includes(this.selectedAsset)) {
                                    this.selectedAssets.push(this.selectedAsset);
                                }
                                this.selectedAsset = null;
                                
                                if (this.selectedAssets.includes(clickedAsset)) {
                                    // Toggle off if already in selection
                                    this.selectedAssets = this.selectedAssets.filter(a => a !== clickedAsset);
                                } else {
                                    this.selectedAssets.push(clickedAsset);
                                }
                                
                                // If only one asset remains, demote back to single selection
                                // so the property editor and rotation handle reappear.
                                if (this.selectedAssets.length === 1) {
                                    this.selectedAsset = this.selectedAssets[0];
                                    this.selectedAssets = [];
                                }
                                
                                this.selectedWall = null;
                                this.selectedText = null;
                                this.selectedPathSegment = null;
                                this.hideTextPropertiesPanel();
                                if (this.selectedAsset) {
                                    this.showPropertyEditor(e.clientX, e.clientY);
                                } else {
                                    this.hidePropertyEditor();
                                }
                            } else {
                                // Check if clicking on an item that's part of multi-selection
                                if (this.selectedAssets.includes(clickedAsset)) {
                                    // Start dragging all multi-selected items
                                    this.isDraggingMultipleAssets = true;
                                    this.multiDragStartPositions = this.selectedAssets.map(asset => ({
                                        asset: asset,
                                        startX: asset.x,
                                        startY: asset.y
                                    }));
                                    this.dragOffset = {
                                        x: point.x,
                                        y: point.y
                                    };
                                } else {
                                    // Single selection (replace current selection)
                                    this.selectedAsset = clickedAsset;
                                    this.selectedAssets = [];
                                    this.selectedWall = null;
                                    this.selectedText = null;
                                    // Start dragging the selected asset
                                    this.isDraggingAsset = true;
                                    this.dragOffset = {
                                        x: point.x - this.selectedAsset.x,
                                        y: point.y - this.selectedAsset.y
                                    };
                                    this.hideTextPropertiesPanel();
                                    // Show property editor immediately (only for single selection)
                                    this.showPropertyEditor(e.clientX, e.clientY);
                                }
                            }
                        } else {
                            // Didn't click on an asset, check for wall
                            const clickedWall = this.getWallAtPoint(point);
                            if (clickedWall) {
                                this.selectedWall = clickedWall;
                                this.selectedAsset = null;
                                this.selectedAssets = [];
                                this.selectedPathSegment = null;
                                this.selectedText = null;
                                this.hideTextPropertiesPanel();
                                // Show property editor immediately
                                this.showPropertyEditor(e.clientX, e.clientY);
                            } else {
                                // Didn't click on wall, check for path segment
                                const clickedPath = this.getPathSegmentAtPoint(point);
                                const clickedRuler = clickedPath ? null : this.getRulerAtPoint(point);
                                if (clickedPath) {
                                    this.selectedPathSegment = clickedPath;
                                    this.selectedWall = null;
                                    this.selectedAsset = null;
                                    this.selectedAssets = [];
                                    this.selectedText = null;
                                    this.selectedRuler = null;
                                    this.hidePropertyEditor();
                                    this.hideTextPropertiesPanel();
                                } else if (clickedRuler) {
                                    this.selectedRuler = clickedRuler;
                                    this.selectedWall = null;
                                    this.selectedAsset = null;
                                    this.selectedAssets = [];
                                    this.selectedText = null;
                                    this.selectedPathSegment = null;
                                    this.hidePropertyEditor();
                                    this.hideTextPropertiesPanel();
                                } else {
                                    // Clicked on empty space - deselect and start panning
                                    this.selectedWall = null;
                                    this.selectedAsset = null;
                                    this.selectedAssets = [];
                                    this.selectedPathSegment = null;
                                    this.selectedText = null;
                                    this.selectedRuler = null;
                                    this.isPanning = true;
                                    this.panStart = { x: e.clientX, y: e.clientY };
                                    this.canvas.classList.add('grabbing');
                                    this.hidePropertyEditor();
                                    this.hideTextPropertiesPanel();
                                }
                            }
                        }
                        this.updateDeleteButton();
                        this.render();
                    }
                } else if (e.button === 1) { // Middle click - always pan
                    this.isPanning = true;
                    this.panStart = { x: e.clientX, y: e.clientY };
                    this.canvas.classList.add('grabbing');
                }
            }

            onMouseMove(e) {
                if (this.isRotating && this.selectedAsset) {
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    const dx = point.x - this.rotationCenter.x;
                    const dy = point.y - this.rotationCenter.y;
                    // The rotation handle sits ABOVE the object's center (local -Y, i.e. world -Y at rotation 0).
                    // atan2(dy, dx) returns 0° along +X and -90° along -Y, so we add 90° to align
                    // "mouse directly above center" with rotation = 0°.
                    let angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
                    // Normalize to [0, 360)
                    angle = ((angle % 360) + 360) % 360;
                    this.selectedAsset.rotation = Math.round(angle / 15) * 15 % 360; // Snap to 15 degrees
                    this.render();
                } else if (this.isDraggingWallStart && this.selectedWall) {
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    // Snap to endpoints and apply angle snapping
                    let snapped = this.snapToWallEndpoint(point);
                    snapped = this.snapPoint(this.selectedWall.end, snapped);
                    this.selectedWall.start = snapped;
                    this.render();
                } else if (this.isDraggingWallEnd && this.selectedWall) {
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    // Snap to endpoints and apply angle snapping
                    let snapped = this.snapToWallEndpoint(point);
                    snapped = this.snapPoint(this.selectedWall.start, snapped);
                    this.selectedWall.end = snapped;
                    this.render();
                } else if (this.isDraggingWallMid && this.selectedWall) {
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    // Calculate midpoint of wall
                    const midX = (this.selectedWall.start.x + this.selectedWall.end.x) / 2;
                    const midY = (this.selectedWall.start.y + this.selectedWall.end.y) / 2;
                    // Calculate offset
                    const offsetX = point.x - midX;
                    const offsetY = point.y - midY;
                    // Move both endpoints by the same offset
                    this.selectedWall.start.x += offsetX;
                    this.selectedWall.start.y += offsetY;
                    this.selectedWall.end.x += offsetX;
                    this.selectedWall.end.y += offsetY;
                    this.render();
                } else if (this.isDraggingMultipleAssets) {
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    const deltaX = point.x - this.dragOffset.x;
                    const deltaY = point.y - this.dragOffset.y;
                    
                    // Move all selected assets by the same delta
                    this.multiDragStartPositions.forEach(item => {
                        item.asset.x = item.startX + deltaX;
                        item.asset.y = item.startY + deltaY;
                    });
                    
                    // Update distances in real-time
                    this.updateAllEntryCalculations();
                    this.updateFurniturePanel();
                    
                    this.render();
                } else if (this.isDraggingAsset && this.selectedAsset) {
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    this.selectedAsset.x = point.x - this.dragOffset.x;
                    this.selectedAsset.y = point.y - this.dragOffset.y;
                    
                    // Update distances in real-time
                    this.updateAllEntryCalculations();
                    this.updateFurniturePanel();
                    
                    this.render();
                } else if (this.isDraggingText && this.selectedText) {
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    this.selectedText.x = point.x - this.dragOffset.x;
                    this.selectedText.y = point.y - this.dragOffset.y;
                    this.render();
                } else if (this.selectedText && this.textClickPosition && !this.isDraggingText) {
                    // Check if we should start dragging (moved more than threshold or enough time passed)
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    const dx = point.x - this.textClickPosition.x;
                    const dy = point.y - this.textClickPosition.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const timeSinceClick = Date.now() - this.textClickTime;
                    
                    // Start dragging if moved more than 5cm or after 200ms
                    if (distance > 5 || timeSinceClick > 200) {
                        this.isDraggingText = true;
                        this.textClickPosition = null;
                    }
                } else if (this.isPanning) {
                    const rect = this.canvas.getBoundingClientRect();
                    const dx = (e.clientX - this.panStart.x) / rect.width * this.viewBox.width;
                    const dy = (e.clientY - this.panStart.y) / rect.height * this.viewBox.height;
                    this.viewBox.x -= dx;
                    this.viewBox.y -= dy;
                    this.panStart = { x: e.clientX, y: e.clientY };
                    this.updateViewBox();
                    this.render();
                } else if (this.isDrawing && this.currentWall) {
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    // First snap to wall endpoints
                    let snapped = this.snapToWallEndpoint(point);
                    // Then apply angle snapping
                    snapped = this.snapPoint(this.currentWall.start, snapped);
                    this.currentWall.end = snapped;
                    this.render();
                } else if (this.isDrawingPath && this.currentPath) {
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    // Apply 90-degree constraint unless Ctrl is held
                    if (e.ctrlKey) {
                        this.currentPath.end = point;
                    } else {
                        const snapped = this.snap90Degrees(this.currentPath.start, point);
                        this.currentPath.end = snapped;
                    }
                    this.render();
                } else if (this.isDrawingRuler && this.currentRuler) {
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    // Hold Shift to snap to 45° increments via the existing helper.
                    this.currentRuler.end = e.shiftKey
                        ? this.snapPoint(this.currentRuler.start, point)
                        : point;
                    this.render();
                } else if (this.mode === 'wall' && !this.isDrawing) {
                    // Hover mode - show alignment preview
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    this.hoverPoint = this.snapToWallEndpoint(point);
                    this.findAlignmentOpportunity(this.hoverPoint);
                    this.render();
                } else if ((this.mode === 'door' || this.mode === 'window' || this.mode === 'furniture' || this.mode === 'safety') && !this.isPanning) {
                    // Show asset preview
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    this.updateAssetPreview(point);
                    this.render();
                }
            }

            onMouseUp(e) {
                // Handle wall anchor dragging
                if (this.isDraggingWallStart || this.isDraggingWallEnd || this.isDraggingWallMid) {
                    this.isDraggingWallStart = false;
                    this.isDraggingWallEnd = false;
                    this.isDraggingWallMid = false;
                    this.saveState();
                    return;
                }
                
                if (this.isDrawing && this.currentWall) {
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    // Snap to wall endpoints first
                    let snapped = this.snapToWallEndpoint(point);
                    // Then apply angle snapping
                    snapped = this.snapPoint(this.currentWall.start, snapped);
                    this.currentWall.end = snapped;
                    
                    // Only add wall if it has some length
                    const dx = this.currentWall.end.x - this.currentWall.start.x;
                    const dy = this.currentWall.end.y - this.currentWall.start.y;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    
                    if (length > 5) {
                        const newWall = { ...this.currentWall };
                        this.walls.push(newWall);
                        
                        // Debug logging for new wall (only in debug mode)
                        if (this.debugDimensions) {
                            const wallIndex = this.walls.length - 1;
                            console.group(`🧱 Wall Placed #${wallIndex}`);
                            console.log(`Start: (${Math.round(newWall.start.x)}, ${Math.round(newWall.start.y)}) | End: (${Math.round(newWall.end.x)}, ${Math.round(newWall.end.y)}) | Length: ${Math.round(length)}cm`);
                            
                            // Check connections at start point
                            const startConnections = this.getConnectedWallsAtEndpoint(newWall.start, newWall);
                            const endConnections = this.getConnectedWallsAtEndpoint(newWall.end, newWall);
                            
                            const startConn = startConnections.length > 0 ? `walls: ${startConnections.map(w => this.walls.indexOf(w)).join(', ')}` : 'none';
                            const endConn = endConnections.length > 0 ? `walls: ${endConnections.map(w => this.walls.indexOf(w)).join(', ')}` : 'none';
                            console.log(`Connections: Start=(${startConn}) | End=(${endConn})`);
                            
                            // Check for T-junctions (where this wall's endpoint touches another wall's centerline)
                            const tJunctions = [];
                            for (const wall of this.walls) {
                                if (wall === newWall) continue;
                                
                                // Check if start or end point lies on this wall's segment
                                [newWall.start, newWall.end].forEach((point, idx) => {
                                    const pointName = idx === 0 ? 'Start' : 'End';
                                    const wdx = wall.end.x - wall.start.x;
                                    const wdy = wall.end.y - wall.start.y;
                                    const wlength = Math.sqrt(wdx * wdx + wdy * wdy);
                                    
                                    if (wlength > 0) {
                                        const t = ((point.x - wall.start.x) * wdx + (point.y - wall.start.y) * wdy) / (wlength * wlength);
                                        
                                        if (t > 0.01 && t < 0.99) {
                                            const projX = wall.start.x + t * wdx;
                                            const projY = wall.start.y + t * wdy;
                                            const distToLine = Math.sqrt(
                                                (point.x - projX) ** 2 + (point.y - projY) ** 2
                                            );
                                            
                                            if (distToLine < 0.1) {
                                                tJunctions.push(`${pointName} → wall #${this.walls.indexOf(wall)}`);
                                            }
                                        }
                                    }
                                });
                            }
                            
                            if (tJunctions.length > 0) {
                                console.log(`T-Junctions: ${tJunctions.join(', ')}`);
                            }
                            
                            // Calculate and log dimension lengths
                            const dx = newWall.end.x - newWall.start.x;
                            const dy = newWall.end.y - newWall.start.y;
                            const angle = Math.atan2(dy, dx);
                            const perpX = -Math.sin(angle);
                            const perpY = Math.cos(angle);
                            const halfThick = this.WALL_THICKNESS / 2;
                            
                            // Check if this wall's endpoints form T-junctions with other walls
                            const startTJunction = this.checkPointOnWall(newWall.start, newWall);
                            const endTJunction = this.checkPointOnWall(newWall.end, newWall);
                            
                            // Calculate inner edge length
                            let innerStartX = newWall.start.x + perpX * halfThick;
                            let innerStartY = newWall.start.y + perpY * halfThick;
                            let innerEndX = newWall.end.x + perpX * halfThick;
                            let innerEndY = newWall.end.y + perpY * halfThick;
                            
                            // Adjust for corner connections OR T-junctions (both shorten by wall thickness)
                            if (startConnections.length > 0 || startTJunction) {
                                innerStartX = newWall.start.x + Math.cos(angle) * this.WALL_THICKNESS + perpX * halfThick;
                                innerStartY = newWall.start.y + Math.sin(angle) * this.WALL_THICKNESS + perpY * halfThick;
                            }
                            if (endConnections.length > 0 || endTJunction) {
                                innerEndX = newWall.end.x - Math.cos(angle) * this.WALL_THICKNESS + perpX * halfThick;
                                innerEndY = newWall.end.y - Math.sin(angle) * this.WALL_THICKNESS + perpY * halfThick;
                            }
                            
                            const innerDx = innerEndX - innerStartX;
                            const innerDy = innerEndY - innerStartY;
                            const innerLength = Math.sqrt(innerDx * innerDx + innerDy * innerDy);
                            
                            // Calculate outer edge length (side 2)
                            let outerStartX = newWall.start.x - perpX * halfThick;
                            let outerStartY = newWall.start.y - perpY * halfThick;
                            let outerEndX = newWall.end.x - perpX * halfThick;
                            let outerEndY = newWall.end.y - perpY * halfThick;
                            
                            // Adjust for corner connections OR T-junctions (both shorten by wall thickness)
                            if (startConnections.length > 0 || startTJunction) {
                                outerStartX = newWall.start.x + Math.cos(angle) * this.WALL_THICKNESS - perpX * halfThick;
                                outerStartY = newWall.start.y + Math.sin(angle) * this.WALL_THICKNESS - perpY * halfThick;
                            }
                            if (endConnections.length > 0 || endTJunction) {
                                outerEndX = newWall.end.x - Math.cos(angle) * this.WALL_THICKNESS - perpX * halfThick;
                                outerEndY = newWall.end.y - Math.sin(angle) * this.WALL_THICKNESS - perpY * halfThick;
                            }
                            
                            const outerDx = outerEndX - outerStartX;
                            const outerDy = outerEndY - outerStartY;
                            const outerLength = Math.sqrt(outerDx * outerDx + outerDy * outerDy);
                            
                            console.log(`Dimensions: Side1=${Math.round(innerLength)}cm | Side2=${Math.round(outerLength)}cm`);
                            console.groupEnd();
                        }
                        
                        // Check if this new wall creates T-junctions on existing walls (only in debug mode)
                        if (this.debugDimensions) {
                            const affectedWalls = [];
                        for (let i = 0; i < this.walls.length - 1; i++) {
                            const wall = this.walls[i];
                            const junctions = this.findTJunctions(wall);
                            if (junctions.length > 0) {
                                // Check if any junction is from the newly placed wall
                                const hasNewJunction = junctions.some(j => {
                                    const dist1 = Math.sqrt(
                                        (j.point.x - newWall.start.x) ** 2 + (j.point.y - newWall.start.y) ** 2
                                    );
                                    const dist2 = Math.sqrt(
                                        (j.point.x - newWall.end.x) ** 2 + (j.point.y - newWall.end.y) ** 2
                                    );
                                    return dist1 < 0.1 || dist2 < 0.1;
                                });
                                
                                if (hasNewJunction) {
                                    affectedWalls.push({index: i, wall: wall, junctions: junctions});
                                }
                            }
                        }
                        
                        if (affectedWalls.length > 0) {
                            console.log('\n=== Affected Walls (T-junctions created) ===');
                            affectedWalls.forEach(({index, wall, junctions}) => {
                                console.log(`\nWall ${index} now has ${junctions.length} T-junction(s):`);
                                console.log(`  Start Point: (${wall.start.x.toFixed(1)}, ${wall.start.y.toFixed(1)})`);
                                console.log(`  End Point: (${wall.end.x.toFixed(1)}, ${wall.end.y.toFixed(1)})`);
                                
                                // Calculate segment dimensions
                                const wdx = wall.end.x - wall.start.x;
                                const wdy = wall.end.y - wall.start.y;
                                const wlength = Math.sqrt(wdx * wdx + wdy * wdy);
                                const wangle = Math.atan2(wdy, wdx);
                                
                                // Sort junction points along the wall
                                const points = [wall.start, ...junctions.map(j => j.point), wall.end];
                                points.sort((a, b) => {
                                    const distA = (a.x - wall.start.x) * wdx + (a.y - wall.start.y) * wdy;
                                    const distB = (b.x - wall.start.x) * wdx + (b.y - wall.start.y) * wdy;
                                    return distA - distB;
                                });
                                
                                // Calculate segment lengths
                                console.log(`  Total wall length: ${Math.round(wlength)} cm`);
                                console.log(`  Segments:`);
                                for (let i = 0; i < points.length - 1; i++) {
                                    let p1 = points[i];
                                    let p2 = points[i + 1];
                                    
                                    // Check if points are junctions
                                    const junction1 = junctions.find(j => 
                                        Math.abs(j.point.x - p1.x) < 0.1 && Math.abs(j.point.y - p1.y) < 0.1
                                    );
                                    const junction2 = junctions.find(j => 
                                        Math.abs(j.point.x - p2.x) < 0.1 && Math.abs(j.point.y - p2.y) < 0.1
                                    );
                                    
                                    // Adjust for junction thickness (dimension to edge, not centerline)
                                    if (junction1) {
                                        p1 = {
                                            x: p1.x + Math.cos(wangle) * halfThick,
                                            y: p1.y + Math.sin(wangle) * halfThick
                                        };
                                    }
                                    if (junction2) {
                                        p2 = {
                                            x: p2.x - Math.cos(wangle) * halfThick,
                                            y: p2.y - Math.sin(wangle) * halfThick
                                        };
                                    }
                                    
                                    const segDx = p2.x - p1.x;
                                    const segDy = p2.y - p1.y;
                                    const segLength = Math.sqrt(segDx * segDx + segDy * segDy);
                                    console.log(`    Segment ${i + 1}: ${Math.round(segLength)} cm`);
                                }
                            });
                            }
                        }
                        
                        this.saveState();
                    }
                    
                    this.currentWall = null;
                    this.isDrawing = false;
                    this.render();
                }
                
                // Handle path drawing
                if (this.isDrawingPath && this.currentPath) {
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    // Apply 90-degree constraint unless Ctrl is held
                    if (e.ctrlKey) {
                        this.currentPath.end = point;
                    } else {
                        const snapped = this.snap90Degrees(this.currentPath.start, point);
                        this.currentPath.end = snapped;
                    }
                    
                    // Only add path if it has some length
                    const dx = this.currentPath.end.x - this.currentPath.start.x;
                    const dy = this.currentPath.end.y - this.currentPath.start.y;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    
                    if (length > 5) {
                        const newSegment = { ...this.currentPath };
                        this.pathSegments.push(newSegment);
                        
                        // Generate nodes along segment
                        this.generateNodesAlongSegment(newSegment.start, newSegment.end);
                        
                        // Detect intersections with existing segments
                        this.detectPathIntersections(newSegment);
                        
                        // Set last end point for continuation
                        this.lastPathEnd = newSegment.end;
                        
                        this.saveState();
                    }
                    
                    this.currentPath = null;
                    this.render();
                }
                
                if (this.isRotating) {
                    this.isRotating = false;
                    this.rotationCenter = null;
                }
                
                // Finalize ruler drawing if any
                if (this.isDrawingRuler && this.currentRuler) {
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    this.currentRuler.end = e.shiftKey
                        ? this.snapPoint(this.currentRuler.start, point)
                        : point;
                    
                    const rdx = this.currentRuler.end.x - this.currentRuler.start.x;
                    const rdy = this.currentRuler.end.y - this.currentRuler.start.y;
                    if (Math.sqrt(rdx * rdx + rdy * rdy) > 5) {
                        this.rulers.push({
                            id: Date.now().toString() + '-' + Math.random().toString(36).substr(2, 9),
                            start: { x: this.currentRuler.start.x, y: this.currentRuler.start.y },
                            end:   { x: this.currentRuler.end.x,   y: this.currentRuler.end.y }
                        });
                        this.saveState();
                    }
                    this.currentRuler = null;
                    this.isDrawingRuler = false;
                    this.render();
                }
                
                if (this.isDraggingAsset || this.isDraggingMultipleAssets) {
                    this.isDraggingAsset = false;
                    this.isDraggingMultipleAssets = false;
                    this.dragOffset = null;
                    this.multiDragStartPositions = [];
                    
                    // Final update after drag ends
                    this.updateAllEntryCalculations();
                    this.updateFurniturePanel();
                    
                    this.saveState();
                }
                
                if (this.isDraggingText) {
                    this.isDraggingText = false;
                    this.dragOffset = null;
                    this.textClickPosition = null;
                    this.saveState();
                } else if (this.textClickPosition) {
                    // Click without drag - just clear the click position
                    this.textClickPosition = null;
                }
                
                if (this.isPanning) {
                    this.isPanning = false;
                    this.canvas.classList.remove('grabbing');
                }
            }

            onDoubleClick(e) {
                if (this.mode === 'select') {
                    const point = this.screenToWorld(e.clientX, e.clientY);
                    
                    // Check if double-clicking on an asset
                    const clickedAsset = this.getAssetAtPoint(point);
                    if (clickedAsset) {
                        this.selectedAsset = clickedAsset;
                        this.selectedWall = null;
                        this.updateDeleteButton();
                        this.render();
                        this.showPropertyEditor(e.clientX, e.clientY);
                        return;
                    }
                    
                    // Check if double-clicking on a wall
                    const clickedWall = this.getWallAtPoint(point);
                    if (clickedWall) {
                        this.selectedWall = clickedWall;
                        this.selectedAsset = null;
                        this.updateDeleteButton();
                        this.render();
                        this.showPropertyEditor(e.clientX, e.clientY);
                        return;
                    }
                }
            }

            onWheel(e) {
                e.preventDefault();
                const factor = e.deltaY > 0 ? 0.9 : 1.1;
                // Get mouse position BEFORE zoom
                const mouseBeforeZoom = this.screenToWorld(e.clientX, e.clientY);
                this.zoomBy(factor, mouseBeforeZoom);
            }

            zoomBy(factor, center = null) {
                const oldZoom = this.zoom;
                this.zoom = Math.max(0.1, Math.min(50, this.zoom * factor));
                
                // Recalculate viewBox maintaining aspect ratio
                const rect = this.container.getBoundingClientRect();
                const canvasWidth = rect.width;
                const canvasHeight = rect.height - 50;
                const aspectRatio = canvasWidth / canvasHeight;
                
                if (aspectRatio > 1) {
                    this.viewBox.width = 4000 * aspectRatio / this.zoom;
                    this.viewBox.height = 4000 / this.zoom;
                } else {
                    this.viewBox.width = 4000 / this.zoom;
                    this.viewBox.height = 4000 / aspectRatio / this.zoom;
                }
                
                if (center) {
                    // Adjust viewBox position to zoom towards the center point
                    const rect = this.canvas.getBoundingClientRect();
                    const mouseX = (center.x - this.viewBox.x) / (4000 * aspectRatio / oldZoom) * rect.width;
                    const mouseY = (center.y - this.viewBox.y) / (4000 / oldZoom) * rect.height;
                    
                    const newCenterX = this.viewBox.x + (mouseX / rect.width) * this.viewBox.width;
                    const newCenterY = this.viewBox.y + (mouseY / rect.height) * this.viewBox.height;
                    
                    this.viewBox.x += center.x - newCenterX;
                    this.viewBox.y += center.y - newCenterY;
                }
                
                this.updateViewBox();
                this.updateZoomDisplay();
                this.render();
            }

            resetView() {
                this.zoom = 8;
                const rect = this.container.getBoundingClientRect();
                const canvasWidth = rect.width;
                const canvasHeight = rect.height - 50;
                const aspectRatio = canvasWidth / canvasHeight;
                
                if (aspectRatio > 1) {
                    this.viewBox = {
                        x: -2000 * aspectRatio,
                        y: -2000,
                        width: 4000 * aspectRatio,
                        height: 4000
                    };
                } else {
                    this.viewBox = {
                        x: -2000,
                        y: -2000 / aspectRatio,
                        width: 4000,
                        height: 4000 / aspectRatio
                    };
                }
                
                this.updateViewBox();
                this.updateZoomDisplay();
                this.render();
            }

            updateZoomDisplay() {
                // Display zoom relative to 8x as 100%
                const displayZoom = (this.zoom / 8) * 100;
                document.getElementById('zoom-level').textContent = Math.round(displayZoom) + '%';
            }

            updateViewBox() {
                this.canvas.setAttribute('viewBox', 
                    `${this.viewBox.x} ${this.viewBox.y} ${this.viewBox.width} ${this.viewBox.height}`);
            }

            screenToWorld(screenX, screenY) {
                const rect = this.canvas.getBoundingClientRect();
                const x = this.viewBox.x + (screenX - rect.left) / rect.width * this.viewBox.width;
                const y = this.viewBox.y + (screenY - rect.top) / rect.height * this.viewBox.height;
                return { x, y };
            }
            findAlignmentOpportunity(point) {
                // Find if this point can be aligned (90° only) to any existing wall endpoints
                this.alignmentGuide = null;
                
                if (!point || this.walls.length === 0) return;
                
                const ALIGNMENT_TOLERANCE = 10; // degrees tolerance for alignment
                
                for (const wall of this.walls) {
                    [wall.start, wall.end].forEach(endpoint => {
                        const dx = wall.end.x - wall.start.x;
                        const dy = wall.end.y - wall.start.y;
                        const wallAngle = Math.atan2(dy, dx);
                        
                        // Calculate angle from endpoint to mouse point
                        const toDx = point.x - endpoint.x;
                        const toDy = point.y - endpoint.y;
                        const toDistance = Math.sqrt(toDx * toDx + toDy * toDy);
                        
                        if (toDistance < 5) return; // Too close
                        
                        const toAngle = Math.atan2(toDy, toDx);
                        
                        // Try perpendicular directions only (90° from wall)
                        const perpAngles = [
                            wallAngle + Math.PI / 2,  // perpendicular right
                            wallAngle - Math.PI / 2,  // perpendicular left
                        ];
                        
                        for (const perpAngle of perpAngles) {
                            const angleDiff = Math.abs(toAngle - perpAngle) * 180 / Math.PI;
                            const normalizedDiff = Math.abs((angleDiff + 180) % 360 - 180);
                            
                            if (normalizedDiff < ALIGNMENT_TOLERANCE) {
                                // Snap to this perpendicular direction
                                const snappedX = endpoint.x + Math.cos(perpAngle) * toDistance;
                                const snappedY = endpoint.y + Math.sin(perpAngle) * toDistance;
                                
                                this.hoverPoint = { x: snappedX, y: snappedY };
                                this.alignmentGuide = { from: endpoint, to: this.hoverPoint };
                                return;
                            }
                        }
                    });
                }
            }

            snapToWallEndpoint(point) {
                
                // Check all existing wall endpoints and wall segments for proximity
                let closestPoint = point;
                let minDistance = this.ENDPOINT_SNAP_DISTANCE;
                
                for (const wall of this.walls) {
                    // Check start point
                    const distToStart = Math.sqrt(
                        (point.x - wall.start.x) ** 2 + (point.y - wall.start.y) ** 2
                    );
                    if (distToStart < minDistance) {
                        minDistance = distToStart;
                        closestPoint = { x: wall.start.x, y: wall.start.y };
                    }
                    
                    // Check end point
                    const distToEnd = Math.sqrt(
                        (point.x - wall.end.x) ** 2 + (point.y - wall.end.y) ** 2
                    );
                    if (distToEnd < minDistance) {
                        minDistance = distToEnd;
                        closestPoint = { x: wall.end.x, y: wall.end.y };
                    }
                    
                    // Check closest point on wall segment
                    const dx = wall.end.x - wall.start.x;
                    const dy = wall.end.y - wall.start.y;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    
                    if (length > 0) {
                        // Project point onto wall line segment
                        const t = Math.max(0, Math.min(1, 
                            ((point.x - wall.start.x) * dx + (point.y - wall.start.y) * dy) / (length * length)
                        ));
                        
                        const projX = wall.start.x + t * dx;
                        const projY = wall.start.y + t * dy;
                        const distToLine = Math.sqrt(
                            (point.x - projX) ** 2 + (point.y - projY) ** 2
                        );
                        
                        // Snap to wall segment if close enough
                        if (distToLine < this.ENDPOINT_SNAP_DISTANCE) {
                            minDistance = distToLine;
                            closestPoint = { x: projX, y: projY };
                        }
                    }
                }
                
                return closestPoint;
            }

            snapPoint(start, end) {
                const dx = end.x - start.x;
                const dy = end.y - start.y;
                const angle = Math.atan2(dy, dx);
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // Snap to 45-degree increments
                const snapAngles = [0, Math.PI/4, Math.PI/2, 3*Math.PI/4, Math.PI, -3*Math.PI/4, -Math.PI/2, -Math.PI/4];
                let closestAngle = angle;
                let minDiff = Infinity;
                
                for (const snapAngle of snapAngles) {
                    const diff = Math.abs(angle - snapAngle);
                    if (diff < minDiff) {
                        minDiff = diff;
                        closestAngle = snapAngle;
                    }
                }
                
                // Only snap if within 10 degrees
                const threshold = 10 * Math.PI / 180;
                if (minDiff < threshold) {
                    return {
                        x: start.x + Math.cos(closestAngle) * distance,
                        y: start.y + Math.sin(closestAngle) * distance
                    };
                }
                
                return end;
            }

            placeAsset(point) {
                const type = (this.mode === 'furniture' || this.mode === 'safety') ? this.currentAssetType : this.mode;
                if (!type || !this.assetTypes[type]) return;
                
                const asset = {
                    id: Date.now().toString() + '-' + Math.random().toString(36).substr(2, 9), // Unique ID
                    type: type,
                    x: point.x,
                    y: point.y,
                    rotation: this.currentAsset ? this.currentAsset.rotation : 0,
                    width: this.assetTypes[type].width,
                    height: this.assetTypes[type].height
                };
                
                // Add empty links array for furniture (but not for safety icons or chairs)
                const isFurniture = type !== 'door' && type !== 'doubleDoor' && type !== 'window' && type !== 'chair' && !this.assetTypes[type].isSafety;
                if (isFurniture) {
                    asset.links = []; // Array of {targetName: string, multiplier: number}
                }
                
                // For doors/windows, try to snap to nearest wall
                if (type === 'door' || type === 'doubleDoor' || type === 'window') {
                    const snapResult = this.snapAssetToWall(asset, point);
                    if (snapResult) {
                        asset.x = snapResult.x;
                        asset.y = snapResult.y;
                        asset.rotation = snapResult.rotation;
                    }
                }
                
                this.assets.push(asset);
                this.currentAsset = null;
                this.saveState();
                this.updateFurniturePanel();
                this.render();
            }
            
            placeText(point) {
                const text = {
                    id: Date.now().toString() + '-' + Math.random().toString(36).substr(2, 9),
                    x: point.x,
                    y: point.y,
                    content: 'Text',
                    size: this.lastTextSize,
                    color: this.lastTextColor,
                    rotation: 0
                };
                
                this.texts.push(text);
                this.selectedText = text;
                
                // Switch to select mode
                this.setMode('select');
                
                // Show properties panel
                this.showTextPropertiesPanel(0, 0);
                
                // Focus the content input
                setTimeout(() => {
                    const contentInput = document.getElementById('text-content-input');
                    if (contentInput) {
                        contentInput.focus();
                        contentInput.select();
                    }
                }, 50);
                
                this.saveState();
                this.updateFooterCounts();
                this.render();
            }

            updateAssetPreview(point) {
                const type = (this.mode === 'furniture' || this.mode === 'safety') ? this.currentAssetType : this.mode;
                if (!type || !this.assetTypes[type]) return;
                
                if (!this.currentAsset) {
                    this.currentAsset = {
                        type: type,
                        x: point.x,
                        y: point.y,
                        rotation: 0,
                        width: this.assetTypes[type].width,
                        height: this.assetTypes[type].height
                    };
                } else {
                    this.currentAsset.x = point.x;
                    this.currentAsset.y = point.y;
                }
                
                // For doors/windows, snap to walls
                if (type === 'door' || type === 'doubleDoor' || type === 'window') {
                    const snapResult = this.snapAssetToWall(this.currentAsset, point);
                    if (snapResult) {
                        this.currentAsset.x = snapResult.x;
                        this.currentAsset.y = snapResult.y;
                        this.currentAsset.rotation = snapResult.rotation;
                    }
                }
            }

            snapAssetToWall(asset, point) {
                // Find nearest wall
                let minDist = 50; // Max snap distance
                let bestSnap = null;
                
                for (const wall of this.walls) {
                    const dx = wall.end.x - wall.start.x;
                    const dy = wall.end.y - wall.start.y;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    
                    if (length === 0) continue;
                    
                    // Project point onto wall
                    const t = Math.max(0, Math.min(1, 
                        ((point.x - wall.start.x) * dx + (point.y - wall.start.y) * dy) / (length * length)
                    ));
                    
                    const projX = wall.start.x + t * dx;
                    const projY = wall.start.y + t * dy;
                    const dist = Math.sqrt((point.x - projX) ** 2 + (point.y - projY) ** 2);
                    
                    if (dist < minDist) {
                        minDist = dist;
                        const wallAngle = Math.atan2(dy, dx) * 180 / Math.PI;
                        bestSnap = {
                            x: projX,
                            y: projY,
                            rotation: wallAngle
                        };
                    }
                }
                
                return bestSnap;
            }

            getAssetAtPoint(point) {
                for (let i = this.assets.length - 1; i >= 0; i--) {
                    const asset = this.assets[i];
                    const halfW = asset.width / 2;
                    const halfH = asset.height / 2;
                    
                    // Transform point to asset's local space
                    const angle = asset.rotation * Math.PI / 180;
                    const cos = Math.cos(-angle);
                    const sin = Math.sin(-angle);
                    const dx = point.x - asset.x;
                    const dy = point.y - asset.y;
                    const localX = dx * cos - dy * sin;
                    const localY = dx * sin + dy * cos;
                    
                    if (Math.abs(localX) <= halfW && Math.abs(localY) <= halfH) {
                        return asset;
                    }
                }
                return null;
            }
            
            getPathSegmentAtPoint(point) {
                const clickRadius = 10; // cm - how close to path to consider a click
                
                for (let i = this.pathSegments.length - 1; i >= 0; i--) {
                    const segment = this.pathSegments[i];
                    const dx = segment.end.x - segment.start.x;
                    const dy = segment.end.y - segment.start.y;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    
                    if (length === 0) continue;
                    
                    // Project point onto line segment
                    const t = Math.max(0, Math.min(1,
                        ((point.x - segment.start.x) * dx + (point.y - segment.start.y) * dy) / (length * length)
                    ));
                    
                    const projX = segment.start.x + t * dx;
                    const projY = segment.start.y + t * dy;
                    const dist = Math.sqrt((point.x - projX) ** 2 + (point.y - projY) ** 2);
                    
                    if (dist < clickRadius) {
                        return segment;
                    }
                }
                return null;
            }
            
            getTextAtPoint(point) {
                for (let i = this.texts.length - 1; i >= 0; i--) {
                    const text = this.texts[i];
                    // Approximate text bounds (height is text size, width is roughly size * length * 0.6)
                    const halfW = (text.content.length * text.size * 0.6) / 2;
                    const halfH = text.size / 2;
                    
                    // Transform point to text's local space
                    const angle = text.rotation * Math.PI / 180;
                    const cos = Math.cos(-angle);
                    const sin = Math.sin(-angle);
                    const dx = point.x - text.x;
                    const dy = point.y - text.y;
                    const localX = dx * cos - dy * sin;
                    const localY = dx * sin + dy * cos;
                    
                    if (Math.abs(localX) <= halfW && Math.abs(localY) <= halfH) {
                        return text;
                    }
                }
                return null;
            }

            isPointOnRotationHandle(point, asset) {
                if (!asset) return false;
                
                // NOTE: Keep these values in sync with the renderer in drawAsset().
                const handleDistance = 130 / this.zoom; // Gap between object edge and handle center
                const handleClickRadius = 58 / this.zoom; // Slightly larger than the visible circle for forgiving clicks
                const halfH = asset.height / 2;
                
                // Handle is drawn at local position (0, -(halfH + handleDistance)) inside a group
                // transformed by `translate(asset.x, asset.y) rotate(asset.rotation)`.
                // SVG rotation matrix: [[cos -sin],[sin cos]] applied to local (lx, ly).
                // For lx = 0, ly = -d:
                //   worldX = asset.x +  d * sin(theta)
                //   worldY = asset.y -  d * cos(theta)
                const theta = asset.rotation * Math.PI / 180;
                const d = halfH + handleDistance;
                const handleX = asset.x + Math.sin(theta) * d;
                const handleY = asset.y - Math.cos(theta) * d;
                
                const dist = Math.sqrt((point.x - handleX) ** 2 + (point.y - handleY) ** 2);
                return dist < handleClickRadius;
            }
            
            isPointOnWallAnchor(point, wall, anchorType) {
                if (!wall) return false;
                
                const anchorRadius = 25 / this.zoom; // Click detection radius
                let anchorX, anchorY;
                
                if (anchorType === 'start') {
                    anchorX = wall.start.x;
                    anchorY = wall.start.y;
                } else if (anchorType === 'end') {
                    anchorX = wall.end.x;
                    anchorY = wall.end.y;
                } else if (anchorType === 'mid') {
                    anchorX = (wall.start.x + wall.end.x) / 2;
                    anchorY = (wall.start.y + wall.end.y) / 2;
                } else {
                    return false;
                }
                
                const dist = Math.sqrt((point.x - anchorX) ** 2 + (point.y - anchorY) ** 2);
                return dist < anchorRadius;
            }

            saveProject() {
                // Create project data
                const projectData = {
                    walls: this.walls,
                    assets: this.assets,
                    pathSegments: this.pathSegments,
                    texts: this.texts,
                    rulers: this.rulers,
                    moveRate: this.moveRate,
                    moveRateEntries: this.moveRateEntries,
                    viewBox: this.viewBox,
                    zoom: this.zoom,
                    version: '1.4'
                };
                
                // Convert to JSON and create a blob
                const jsonString = JSON.stringify(projectData, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                // Trigger download
                const link = document.createElement('a');
                link.href = url;
                link.download = 'floor-plan-project.json';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
