            loadProject() {
                // Create file input
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const projectData = JSON.parse(event.target.result);
                            
                            // Validate data
                            if (!projectData.walls || !Array.isArray(projectData.walls)) {
                                alert('Invalid project file!');
                                return;
                            }
                            
                            // Load project data
                            this.walls = projectData.walls;
                            this.assets = projectData.assets || [];
                            this.pathSegments = projectData.pathSegments || [];
                            this.texts = projectData.texts || [];
                            this.rulers = projectData.rulers || [];
                            this.moveRate = projectData.moveRate || 2.5;
                            this.moveRateEntries = projectData.moveRateEntries || [];
                            
                            // Ensure all furniture has links array and unique IDs
                            this.assets.forEach(asset => {
                                // Add ID if missing (for backward compatibility)
                                if (!asset.id) {
                                    asset.id = Date.now().toString() + '-' + Math.random().toString(36).substr(2, 9);
                                }
                                
                                const isFurniture = asset.type !== 'door' && asset.type !== 'doubleDoor' && asset.type !== 'window' && asset.type !== 'chair';
                                if (isFurniture && !asset.links) {
                                    asset.links = [];
                                }
                            });
                            
                            // Regenerate path nodes from segments
                            this.pathNodes = [];
                            this.pathSegments.forEach(seg => {
                                this.generateNodesAlongSegment(seg.start, seg.end);
                            });
                            
                            if (projectData.viewBox) {
                                this.viewBox = projectData.viewBox;
                            }
                            if (projectData.zoom) {
                                this.zoom = projectData.zoom;
                            }
                            
                            // Reset selection and mode
                            this.selectedWall = null;
                            this.selectedAsset = null;
                            this.selectedText = null;
                            this.selectedRuler = null;
                            this.setMode('select');
                            
                            // Update display
                            this.updateViewBox();
                            this.updateZoomDisplay();
                            this.updateDeleteButton();
                            this.updateAllEntryCalculations();
                            this.updateFurniturePanel();
                            this.render();
                            
                        } catch (error) {
                            alert('Error loading project: ' + error.message);
                        }
                    };
                    reader.readAsText(file);
                };
                
                input.click();
            }

            // Helper function: Convert coordinates to grid reference (e.g., 'B3')
            getGridReference(x, y) {
                // Calculate grid offsets based on GRID_MAJOR (100cm)
                const gridX = Math.floor(x / this.GRID_MAJOR);
                const gridY = Math.floor(y / this.GRID_MAJOR);
                
                // Convert to letter (A, B, C, ...) for horizontal
                const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                let colLabel = '';
                let col = gridX;
                if (col < 0) {
                    colLabel = '(-' + letters[Math.abs(col + 1) % 26] + ')';
                } else {
                    colLabel = letters[col % 26];
                    if (col >= 26) colLabel = letters[Math.floor(col / 26) - 1] + colLabel;
                }
                
                // Use number for vertical (1, 2, 3, ...)
                const rowLabel = gridY + 1;
                
                return colLabel + rowLabel;
            }
            
            // Helper function: Calculate path distance in meters
            calculatePathDistance(segments) {
                let totalCm = 0;
                segments.forEach(seg => {
                    const dx = seg.end.x - seg.start.x;
                    const dy = seg.end.y - seg.start.y;
                    const distCm = Math.sqrt(dx * dx + dy * dy); // units are cm
                    totalCm += distCm;
                });
                return totalCm / 100; // Convert to meters
            }
            
            // Helper function: Get furniture connection data for table
            getFurnitureConnectionData() {
                console.group('🔍 getFurnitureConnectionData DEBUG');
                const data = [];
                const walkingSpeedMs = 1.4; // meters per second
                
                console.log('Total assets:', this.assets.length);
                console.log('Path nodes available:', this.pathNodes.length);
                
                this.assets.forEach((asset, index) => {
                    // Only include furniture with names and links
                    const isFurniture = asset.type !== 'door' && asset.type !== 'doubleDoor' && asset.type !== 'window';
                    
                    console.log(`Asset ${index}:`, {
                        type: asset.type,
                        name: asset.name,
                        isFurniture,
                        hasLinks: !!asset.links,
                        linksCount: asset.links ? asset.links.length : 0,
                        links: asset.links
                    });
                    
                    if (isFurniture && asset.name && asset.links && asset.links.length > 0) {
                        const gridRef = this.getGridReference(asset.x, asset.y);
                        
                        asset.links.forEach((link, linkIdx) => {
                            if (!link.targetName) {
                                console.log(`  Link ${linkIdx}: No targetName, skipping`);
                                return;
                            }
                            
                            // Find the linked furniture
                            const linkedAsset = this.assets.find(a => a.name === link.targetName);
                            if (!linkedAsset) {
                                console.log(`  Link ${linkIdx}: Target "${link.targetName}" not found`);
                                return;
                            }
                            
                            if (this.pathNodes.length === 0) {
                                console.log(`  Link ${linkIdx}: No path nodes available`);
                                return;
                            }
                            
                            // Calculate path dynamically using the same method as the move rate panel
                            const path = this.findShortestPathBetweenFurniture(asset, linkedAsset);
                            if (!path || path.length === 0) {
                                console.log(`  Link ${linkIdx}: No path found between ${asset.name} and ${link.targetName}`);
                                return;
                            }
                            
                            console.log(`  Link ${linkIdx}:`, {
                                targetName: link.targetName,
                                pathLength: path.length,
                                pathFound: true
                            });
                            
                            // Calculate distance from path
                            const distanceCm = this.calculatePathDistance(path);
                            const distanceMeters = distanceCm / 100; // Convert cm to meters
                            const timeSeconds = distanceMeters / walkingSpeedMs;
                            
                            data.push({
                                name: asset.name,
                                gridRef: gridRef,
                                connectedTo: link.targetName,
                                distance: distanceMeters.toFixed(2),
                                timeSeconds: timeSeconds.toFixed(1)
                            });
                            
                            console.log(`    ✅ Added to data: ${asset.name} → ${link.targetName} (${distanceMeters.toFixed(2)}m)`);
                        });
                    }
                });
                
                console.log('Final data array:', data);
                console.groupEnd();
                return data;
            }
            
            // Helper function: Draw grid frame with A,B,C... and 1,2,3... labels in boxes
            drawGridFrame(svg, bounds, planBounds) {
                const svgNS = 'http://www.w3.org/2000/svg';
                const fontSize = 12;
                const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                
                // Calculate grid divisions based on original coordinates
                const startX = Math.floor(bounds.minX / this.GRID_MAJOR) * this.GRID_MAJOR;
                const endX = Math.ceil(bounds.maxX / this.GRID_MAJOR) * this.GRID_MAJOR;
                const startY = Math.floor(bounds.minY / this.GRID_MAJOR) * this.GRID_MAJOR;
                const endY = Math.ceil(bounds.maxY / this.GRID_MAJOR) * this.GRID_MAJOR;
                
                // Scale factor to map original coords to display coords
                const scaleX = (planBounds.maxX - planBounds.minX) / (bounds.maxX - bounds.minX);
                const scaleY = (planBounds.maxY - planBounds.minY) / (bounds.maxY - bounds.minY);
                
                // Calculate grid size in display coordinates (1 meter = GRID_MAJOR)
                const gridWidthDisplay = this.GRID_MAJOR * scaleX;
                const gridHeightDisplay = this.GRID_MAJOR * scaleY;
                
                // Extend plan bounds by 1 grid to right and bottom only
                const extendedMaxX = planBounds.maxX + gridWidthDisplay;
                const extendedMaxY = planBounds.maxY + gridHeightDisplay;
                
                // Draw main border around extended plan
                const frameBorder = document.createElementNS(svgNS, 'rect');
                frameBorder.setAttribute('x', planBounds.minX);
                frameBorder.setAttribute('y', planBounds.minY);
                frameBorder.setAttribute('width', extendedMaxX - planBounds.minX);
                frameBorder.setAttribute('height', extendedMaxY - planBounds.minY);
                frameBorder.setAttribute('fill', 'none');
                frameBorder.setAttribute('stroke', '#000');
                frameBorder.setAttribute('stroke-width', '2');
                svg.appendChild(frameBorder);
                
                // Draw horizontal labels (A, B, C...) - TOP ONLY, full grid width
                let colIndex = 0;
                for (let x = startX; x <= endX; x += this.GRID_MAJOR) {
                    const label = letters[colIndex % 26];
                    const displayX = planBounds.minX + (x - bounds.minX) * scaleX;
                    
                    // Calculate next grid position for width
                    const nextDisplayX = colIndex < Math.ceil((endX - startX) / this.GRID_MAJOR) 
                        ? planBounds.minX + ((x + this.GRID_MAJOR) - bounds.minX) * scaleX
                        : displayX + gridWidthDisplay;
                    const boxWidth = nextDisplayX - displayX;
                    
                    // Top label box - full grid width, ABOVE the plan
                    const labelY = planBounds.minY - gridHeightDisplay;
                    const boxRect = document.createElementNS(svgNS, 'rect');
                    boxRect.setAttribute('x', displayX);
                    boxRect.setAttribute('y', labelY);
                    boxRect.setAttribute('width', boxWidth);
                    boxRect.setAttribute('height', gridHeightDisplay);
                    boxRect.setAttribute('fill', '#fff');
                    boxRect.setAttribute('stroke', '#000');
                    boxRect.setAttribute('stroke-width', '1');
                    svg.appendChild(boxRect);
                    
                    const topText = document.createElementNS(svgNS, 'text');
                    topText.setAttribute('x', displayX + boxWidth / 2);
                    topText.setAttribute('y', labelY + gridHeightDisplay / 2);
                    topText.setAttribute('text-anchor', 'middle');
                    topText.setAttribute('dominant-baseline', 'middle');
                    topText.setAttribute('font-size', fontSize);
                    topText.setAttribute('font-weight', 'bold');
                    topText.setAttribute('fill', '#000');
                    topText.textContent = label;
                    svg.appendChild(topText);
                    
                    colIndex++;
                }
                
                // Draw vertical labels (1, 2, 3...) - LEFT ONLY, full grid height
                let rowIndex = 1;
                for (let y = startY; y <= endY; y += this.GRID_MAJOR) {
                    const displayY = planBounds.minY + (y - bounds.minY) * scaleY;
                    
                    // Calculate next grid position for height
                    const nextDisplayY = rowIndex <= Math.ceil((endY - startY) / this.GRID_MAJOR)
                        ? planBounds.minY + ((y + this.GRID_MAJOR) - bounds.minY) * scaleY
                        : displayY + gridHeightDisplay;
                    const boxHeight = nextDisplayY - displayY;
                    
                    // Left label box - full grid height, LEFT of the plan
                    const labelX = planBounds.minX - gridWidthDisplay;
                    const boxRect = document.createElementNS(svgNS, 'rect');
                    boxRect.setAttribute('x', labelX);
                    boxRect.setAttribute('y', displayY);
                    boxRect.setAttribute('width', gridWidthDisplay);
                    boxRect.setAttribute('height', boxHeight);
                    boxRect.setAttribute('fill', '#fff');
                    boxRect.setAttribute('stroke', '#000');
                    boxRect.setAttribute('stroke-width', '1');
                    svg.appendChild(boxRect);
                    
                    const leftText = document.createElementNS(svgNS, 'text');
                    leftText.setAttribute('x', labelX + gridWidthDisplay / 2);
                    leftText.setAttribute('y', displayY + boxHeight / 2);
                    leftText.setAttribute('text-anchor', 'middle');
                    leftText.setAttribute('dominant-baseline', 'middle');
                    leftText.setAttribute('font-size', fontSize);
                    leftText.setAttribute('font-weight', 'bold');
                    leftText.setAttribute('fill', '#000');
                    leftText.textContent = rowIndex;
                    svg.appendChild(leftText);
                    
                    rowIndex++;
                }
            }
            
            // Helper function: Draw furniture cards (sidebar style)
            drawFurnitureCards(svg, furnitureData, startX, startY, cardWidth, maxHeight) {
                if (furnitureData.length === 0) return startY;
                
                const svgNS = 'http://www.w3.org/2000/svg';
                const cardHeight = 240;  // 80 * 3
                const cardGap = 30;      // 10 * 3
                const cardPadding = 36;  // 12 * 3
                const fontSize = 39;     // 13 * 3
                const titleFontSize = 42; // 14 * 3
                
                // Draw header
                const header = document.createElementNS(svgNS, 'text');
                header.setAttribute('x', startX);
                header.setAttribute('y', startY);
                header.setAttribute('font-size', 48);  // 16 * 3
                header.setAttribute('font-weight', '600');
                header.setAttribute('fill', '#000');
                header.textContent = 'Connections';
                svg.appendChild(header);
                
                let currentY = startY + 75;  // 25 * 3
                
                // Group by furniture
                const grouped = {};
                furnitureData.forEach(item => {
                    if (!grouped[item.name]) {
                        grouped[item.name] = {
                            name: item.name,
                            gridRef: item.gridRef,
                            totalDistance: 0,
                            totalTime: 0,
                            linkCount: 0
                        };
                    }
                    grouped[item.name].totalDistance += parseFloat(item.distance);
                    grouped[item.name].totalTime += parseFloat(item.timeSeconds);
                    grouped[item.name].linkCount++;
                });
                
                // Draw cards
                Object.values(grouped).forEach((item, index) => {
                    if (currentY + cardHeight > startY + maxHeight) return; // Don't overflow
                    
                    // Card background
                    const card = document.createElementNS(svgNS, 'rect');
                    card.setAttribute('x', startX);
                    card.setAttribute('y', currentY);
                    card.setAttribute('width', cardWidth);
                    card.setAttribute('height', cardHeight);
                    card.setAttribute('fill', '#fff');
                    card.setAttribute('stroke', '#000');
                    card.setAttribute('stroke-width', '1');
                    svg.appendChild(card);
                    
                    // Furniture name
                    const nameText = document.createElementNS(svgNS, 'text');
                    nameText.setAttribute('x', startX + cardPadding);
                    nameText.setAttribute('y', currentY + cardPadding + 42);  // 14 * 3
                    nameText.setAttribute('font-size', titleFontSize);
                    nameText.setAttribute('font-weight', '600');
                    nameText.setAttribute('fill', '#000');
                    nameText.textContent = `${item.name} (${item.linkCount} ${item.linkCount === 1 ? 'link' : 'links'})`;
                    svg.appendChild(nameText);
                    
                    // Grid reference
                    const gridText = document.createElementNS(svgNS, 'text');
                    gridText.setAttribute('x', startX + cardPadding);
                    gridText.setAttribute('y', currentY + cardPadding + 96);  // 32 * 3
                    gridText.setAttribute('font-size', fontSize);
                    gridText.setAttribute('fill', '#000');
                    gridText.textContent = `Grid: ${item.gridRef}`;
                    svg.appendChild(gridText);
                    
                    // Distance stat
                    const distLabel = document.createElementNS(svgNS, 'text');
                    distLabel.setAttribute('x', startX + cardPadding);
                    distLabel.setAttribute('y', currentY + cardHeight - 72);  // 24 * 3
                    distLabel.setAttribute('font-size', fontSize);
                    distLabel.setAttribute('fill', '#000');
                    distLabel.textContent = 'Distance:';
                    svg.appendChild(distLabel);
                    
                    const distValue = document.createElementNS(svgNS, 'text');
                    distValue.setAttribute('x', startX + cardWidth - cardPadding);
                    distValue.setAttribute('y', currentY + cardHeight - 72);  // 24 * 3
                    distValue.setAttribute('font-size', fontSize);
                    distValue.setAttribute('font-weight', '600');
                    distValue.setAttribute('fill', '#000');
                    distValue.setAttribute('text-anchor', 'end');
                    distValue.textContent = `${item.totalDistance.toFixed(2)} m`;
                    svg.appendChild(distValue);
                    
                    // Time stat
                    const timeLabel = document.createElementNS(svgNS, 'text');
                    timeLabel.setAttribute('x', startX + cardPadding);
                    timeLabel.setAttribute('y', currentY + cardHeight - 30);  // 10 * 3
                    timeLabel.setAttribute('font-size', fontSize);
                    timeLabel.setAttribute('fill', '#000');
                    timeLabel.textContent = 'Time:';
                    svg.appendChild(timeLabel);
                    
                    const timeValue = document.createElementNS(svgNS, 'text');
                    timeValue.setAttribute('x', startX + cardWidth - cardPadding);
                    timeValue.setAttribute('y', currentY + cardHeight - 30);  // 10 * 3
                    timeValue.setAttribute('font-size', fontSize);
                    timeValue.setAttribute('font-weight', '600');
                    timeValue.setAttribute('fill', '#000');
                    timeValue.setAttribute('text-anchor', 'end');
                    timeValue.textContent = `${item.totalTime.toFixed(1)} s`;
                    svg.appendChild(timeValue);
                    
                    currentY += cardHeight + cardGap;
                });
                
                return currentY;
            }

            showExportModal() {
                const modal = document.getElementById('export-modal');
                const closeBtn = document.getElementById('export-modal-close');
                const cancelBtn = document.getElementById('export-modal-cancel');
                const exportBtn = document.getElementById('export-modal-export');
                const dateInput = document.getElementById('export-date');
                
                // Set today's date
                const today = new Date().toISOString().split('T')[0];
                dateInput.value = today;
                
                // Show modal
                modal.style.display = 'flex';
                
                // Close handlers
                const closeModal = () => {
                    modal.style.display = 'none';
                };
                
                closeBtn.onclick = closeModal;
                cancelBtn.onclick = closeModal;
                
                // Hide all the legacy "Professional" fields — neither Simple nor
                // Heatmap mode uses creator/date/comments/layout. They stay in the
                // DOM in case we want to bring them back later.
                const hideLegacyFields = () => {
                    ['export-creator', 'export-date', 'export-comments'].forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.closest('.property-row').style.display = 'none';
                    });
                    const orientationInput = document.querySelector('input[name="export-orientation"]');
                    if (orientationInput) orientationInput.closest('.property-row').style.display = 'none';
                };
                hideLegacyFields();
                
                // Export handler
                exportBtn.onclick = () => {
                    const exportMode = document.querySelector('input[name="export-mode"]:checked').value;
                    const includeGrid = document.getElementById('export-include-grid').checked;
                    const includeHeatmap = exportMode === 'heatmap';
                    const includeDimensions = document.getElementById('export-include-dimensions').checked;
                    const colorOverrideOn = document.getElementById('export-color-override').checked;
                    const colorOverride = colorOverrideOn
                        ? document.getElementById('export-color-value').value
                        : null;
                    
                    closeModal();
                    this.exportSVGSimple(includeGrid, includeHeatmap, {
                        hideDimensions: !includeDimensions,
                        colorOverride
                    });
                };
                
                // Close on backdrop click
                modal.onclick = (e) => {
                    if (e.target === modal) {
                        closeModal();
                    }
                };
            }

                    maxY = Math.max(maxY, wall.start.y, wall.end.y);
                });
                
                this.assets.forEach(asset => {
                    const halfW = asset.width / 2;
                    const halfH = asset.height / 2;
                    minX = Math.min(minX, asset.x - halfW);
                    minY = Math.min(minY, asset.y - halfH);
                    maxX = Math.max(maxX, asset.x + halfW);
                    maxY = Math.max(maxY, asset.y + halfH);
                });
                
                const contentPadding = 100;
                const origMinX = minX - contentPadding;
                const origMinY = minY - contentPadding;
                const origMaxX = maxX + contentPadding;
                const origMaxY = maxY + contentPadding;
                const contentWidth = origMaxX - origMinX;
                const contentHeight = origMaxY - origMinY;
                
                // Set up SVG with viewBox to fit content
                exportSvg.setAttribute('xmlns', svgNS);
                exportSvg.setAttribute('viewBox', `${origMinX} ${origMinY} ${contentWidth} ${contentHeight}`);
                exportSvg.setAttribute('width', contentWidth);
                exportSvg.setAttribute('height', contentHeight);
                
                // White background
                const bg = document.createElementNS(svgNS, 'rect');
                bg.setAttribute('x', origMinX);
                bg.setAttribute('y', origMinY);
                bg.setAttribute('width', contentWidth);
                bg.setAttribute('height', contentHeight);
                bg.setAttribute('fill', '#ffffff');
                exportSvg.appendChild(bg);
                
                // Copy defs (wall pattern)
                const defs = document.createElementNS(svgNS, 'defs');
                const pattern = document.createElementNS(svgNS, 'pattern');
                pattern.setAttribute('id', 'wallPattern');
                pattern.setAttribute('patternUnits', 'userSpaceOnUse');
                pattern.setAttribute('width', '5');
                pattern.setAttribute('height', '5');
                pattern.setAttribute('patternTransform', 'rotate(45)');
                
                const bgRect = document.createElementNS(svgNS, 'rect');
                bgRect.setAttribute('x', '0');
                bgRect.setAttribute('y', '0');
                bgRect.setAttribute('width', '5');
                bgRect.setAttribute('height', '5');
                bgRect.setAttribute('fill', 'white');
                pattern.appendChild(bgRect);
                
                const line = document.createElementNS(svgNS, 'line');
                line.setAttribute('x1', '0');
                line.setAttribute('y1', '0');
                line.setAttribute('x2', '0');
                line.setAttribute('y2', '5');
                line.setAttribute('stroke', '#666');
                line.setAttribute('stroke-width', '1');
                pattern.appendChild(line);
                defs.appendChild(pattern);
                exportSvg.appendChild(defs);
                
                // Temporarily redirect canvas to export SVG
                const originalCanvas = this.canvas;
                const originalViewBox = {...this.viewBox};
                this.canvas = exportSvg;
                this.viewBox = { x: origMinX, y: origMinY, width: contentWidth, height: contentHeight };
                
                // Tell the dimension drawers to bail if the user opted out.
                const prevHideDims = this.exportHideDimensions;
                this.exportHideDimensions = !!hideDimensions;
                
                // Draw grid if requested
                if (includeGrid) {
                    this.drawGrid();
                }
                
                // Heatmap layer goes between grid and walls so the floor plan
                // remains crisp on top. We temporarily flip the visibility flag
                // because drawDensityHeatmap() bails when it's off.
                if (includeHeatmap) {
                    const wasVisible = this.densityHeatmapVisible;
                    this.densityHeatmapVisible = true;
                    this.drawDensityHeatmap();
                    this.densityHeatmapVisible = wasVisible;
                }
                
                // Draw walls and assets
                if (this.walls.length > 0) {
                    this.drawWalls();
                }
                if (this.assets.length > 0) {
                    this.assets.forEach(asset => {
                        this.drawAsset(asset, false, false, false, false);
                    });
                }
                
                // Apply optional color override across all rendered geometry. We
                // walk the tree and rewrite stroke/fill, but leave white fills
                // (label pills, door frames, the page background) and elements
                // marked data-export-keep-color (the density heatmap) alone.
                if (colorOverride) {
                    this.applyExportColorOverride(exportSvg, colorOverride);
                }
                
                // Restore original canvas and viewBox
                this.canvas = originalCanvas;
                this.viewBox = originalViewBox;
                this.exportHideDimensions = prevHideDims;
                
                // Serialize and download
                const serializer = new XMLSerializer();
                const svgString = serializer.serializeToString(exportSvg);
                const blob = new Blob([svgString], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = includeHeatmap ? 'floor_plan_heatmap.svg' : 'floor_plan_simple.svg';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }

            // Walk an exported SVG tree and rewrite stroke/fill colors to a
            // single user-chosen color. We deliberately leave a few things
            // alone so the result stays readable:
            //   - elements (and descendants) tagged data-export-keep-color
            //     (used by the density heatmap layer) keep their colors
            //   - 'none' and url(...) references (e.g. the wall hatch pattern)
            //     stay as-is
            //   - white-ish fills (label pill backgrounds, door interiors,
            //     pattern background, page background) stay white so the
            //     override color contrasts against them
            applyExportColorOverride(root, color) {
                if (!root || root.nodeType !== 1) return;
                if (root.getAttribute && root.getAttribute('data-export-keep-color') === '1') return;
                
                const isWhite = (v) => {
                    if (!v) return false;
                    const s = v.trim().toLowerCase();
                    return s === 'white' || s === '#fff' || s === '#ffffff' ||
                           s === 'rgb(255,255,255)' || s === 'rgb(255, 255, 255)';
                };
                const isReplaceable = (v) => {
                    if (!v) return false;
                    const s = v.trim().toLowerCase();
                    if (s === 'none' || s === 'transparent') return false;
                    if (s.startsWith('url(')) return false;
                    return true;
                };
                
                const stroke = root.getAttribute && root.getAttribute('stroke');
                if (isReplaceable(stroke)) {
                    root.setAttribute('stroke', color);
                }
                const fill = root.getAttribute && root.getAttribute('fill');
                if (isReplaceable(fill) && !isWhite(fill)) {
                    root.setAttribute('fill', color);
                }
                
                const children = root.children;
                if (children) {
                    for (let i = 0; i < children.length; i++) {
                        this.applyExportColorOverride(children[i], color);
                    }
                }
            }

                const serializer = new XMLSerializer();

            getWallAtPoint(point) {
                for (let i = this.walls.length - 1; i >= 0; i--) {
                    const wall = this.walls[i];
                    const dist = this.pointToLineDistance(point, wall.start, wall.end);
                    if (dist < this.WALL_THICKNESS) {
                        return wall;
                    }
                }
                return null;
            }

            pointToLineDistance(point, lineStart, lineEnd) {
                const dx = lineEnd.x - lineStart.x;
                const dy = lineEnd.y - lineStart.y;
                const length = Math.sqrt(dx * dx + dy * dy);
                if (length === 0) return Math.sqrt((point.x - lineStart.x) ** 2 + (point.y - lineStart.y) ** 2);
                
                const t = Math.max(0, Math.min(1, ((point.x - lineStart.x) * dx + (point.y - lineStart.y) * dy) / (length * length)));
                const projX = lineStart.x + t * dx;
                const projY = lineStart.y + t * dy;
                return Math.sqrt((point.x - projX) ** 2 + (point.y - projY) ** 2);
            }

            lineIntersection(x1, y1, x2, y2, x3, y3, x4, y4) {
                // Calculate intersection of two line segments
                const denom = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
                if (Math.abs(denom) < 0.0001) return null; // Lines are parallel
                
                const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / denom;
                
                return {
                    x: x1 + t * (x2 - x1),
                    y: y1 + t * (y2 - y1)
                };
            }
            
            // Walking Path Helper Functions
            snap90Degrees(start, current) {
                // Force 90-degree angles
                const dx = Math.abs(current.x - start.x);
                const dy = Math.abs(current.y - start.y);
                
                if (dx > dy) {
                    // Force horizontal
                    return { x: current.x, y: start.y };
                } else {
                    // Force vertical
                    return { x: start.x, y: current.y };
                }
            }
            
            generateNodesAlongSegment(start, end) {
                const dx = end.x - start.x;
                const dy = end.y - start.y;
                const length = Math.sqrt(dx * dx + dy * dy);
                const numNodes = Math.floor(length / 10); // Node every 10cm
                
                if (numNodes === 0) return;
                
                const stepX = dx / numNodes;
                const stepY = dy / numNodes;
                
                for (let i = 0; i <= numNodes; i++) {
                    this.pathNodes.push({
                        x: start.x + stepX * i,
                        y: start.y + stepY * i
                    });
                }
            }
            
            detectPathIntersections(newSegment) {
                // Check if new segment intersects with existing segments
                for (const segment of this.pathSegments) {
                    if (segment === newSegment) continue;
                    
                    const intersection = this.lineSegmentIntersection(newSegment, segment);
                    if (intersection) {
                        // Add intersection point as a node
                        this.pathNodes.push(intersection);
                    }
                }
            }
            
            lineSegmentIntersection(seg1, seg2) {
                // Returns intersection point if segments intersect, null otherwise
                const x1 = seg1.start.x, y1 = seg1.start.y;
                const x2 = seg1.end.x, y2 = seg1.end.y;
                const x3 = seg2.start.x, y3 = seg2.start.y;
                const x4 = seg2.end.x, y4 = seg2.end.y;
                
                const denom = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
                if (Math.abs(denom) < 0.0001) return null; // Parallel
                
                const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / denom;
                const u = -((x1 - x2) * (y1 - y3) - (y1 - y2) * (x1 - x3)) / denom;
                
                // Check if intersection is within both segments
                if (t >= 0 && t <= 1 && u >= 0 && u <= 1) {
                    return {
                        x: x1 + t * (x2 - x1),
                        y: y1 + t * (y2 - y1)
                    };
                }
                
                return null;
            }
            
            drawPaths() {
                const svgNS = 'http://www.w3.org/2000/svg';
                
                // Per-selection shortest paths (suppressed when the global heatmap is on).
                // Highlights both OUTBOUND links (where the selected asset links to others)
                // and INBOUND links (where other assets link to the selected one), so a
                // shared destination like SHELVE 1 lights up all converging paths.
                const shortestPaths = [];
                if (!this.showAllPaths && this.selectedAsset && this.pathNodes.length > 0) {
                    // Outbound: selectedAsset -> targets in its own links array
                    if (this.selectedAsset.links && this.selectedAsset.links.length > 0) {
                        this.selectedAsset.links.forEach(link => {
                            if (!link.targetName) return;
                            const linkedFurniture = this.assets.find(a => a.name === link.targetName);
                            if (linkedFurniture) {
                                const path = this.findShortestPathBetweenFurniture(this.selectedAsset, linkedFurniture);
                                if (path) {
                                    shortestPaths.push(path);
                                }
                            }
                        });
                    }
                    
                    // Inbound: any other asset whose links reference this asset by name
                    if (this.selectedAsset.name) {
                        this.assets.forEach(other => {
                            if (other === this.selectedAsset) return;
                            if (!other.links || other.links.length === 0) return;
                            other.links.forEach(link => {
                                if (link.targetName !== this.selectedAsset.name) return;
                                const path = this.findShortestPathBetweenFurniture(other, this.selectedAsset);
                                if (path) {
                                    shortestPaths.push(path);
                                }
                            });
                        });
                    }
                }
                
                // Draw all path segments as dotted blue lines
                this.pathSegments.forEach(segment => {
                    const isSelected = this.selectedPathSegment === segment;
                    const line = document.createElementNS(svgNS, 'line');
                    line.setAttribute('x1', segment.start.x);
                    line.setAttribute('y1', segment.start.y);
                    line.setAttribute('x2', segment.end.x);
                    line.setAttribute('y2', segment.end.y);
                    line.setAttribute('stroke', isSelected ? '#ff8c00' : '#4a90e2');
                    line.setAttribute('stroke-width', isSelected ? 6 / this.zoom : 2 / this.zoom);
                    line.setAttribute('stroke-dasharray', `${5/this.zoom},${5/this.zoom}`);
                    this.canvas.appendChild(line);
                });
                
                // Global heatmap: render every linked-pair path with stroke-width and
                // color saturation scaled by how many links use each segment.
                let heatmap = null;
                if (this.showAllPaths) {
                    heatmap = this.computeAllPathsHeatmap();
                    if (heatmap.segments.length > 0 && heatmap.maxWeight > 0) {
                        const minStroke = 5 / this.zoom;
                        const maxStroke = 22 / this.zoom;
                        
                        heatmap.segments.forEach(seg => {
                            const ratio = seg.weight / heatmap.maxWeight;
                            const stroke = minStroke + (maxStroke - minStroke) * ratio;
                            // Lightness 70% (light pink) -> 28% (deep red)
                            const lightness = 70 - 42 * ratio;
                            const color = `hsl(0, 80%, ${lightness}%)`;
                            
                            const line = document.createElementNS(svgNS, 'line');
                            line.setAttribute('x1', seg.a.x);
                            line.setAttribute('y1', seg.a.y);
                            line.setAttribute('x2', seg.b.x);
                            line.setAttribute('y2', seg.b.y);
                            line.setAttribute('stroke', color);
                            line.setAttribute('stroke-width', stroke);
                            line.setAttribute('stroke-linecap', 'round');
                            line.setAttribute('opacity', '0.85');
                            this.canvas.appendChild(line);
                        });
                    }
                }
                
                // Draw per-selection shortest paths (only when heatmap is OFF)
                shortestPaths.forEach(shortestPath => {
                    for (let i = 0; i < shortestPath.length - 1; i++) {
                        const line = document.createElementNS(svgNS, 'line');
                        line.setAttribute('x1', shortestPath[i].x);
                        line.setAttribute('y1', shortestPath[i].y);
                        line.setAttribute('x2', shortestPath[i+1].x);
                        line.setAttribute('y2', shortestPath[i+1].y);
                        line.setAttribute('stroke', '#ff4444');
                        line.setAttribute('stroke-width', 10 / this.zoom);
                        line.setAttribute('stroke-dasharray', `${8/this.zoom},${4/this.zoom}`);
                        this.canvas.appendChild(line);
                    }
                });
                
                // Group nearby nodes (within 1cm) and draw as blue circles
                const drawnNodes = new Set();
                this.pathNodes.forEach((node, idx) => {
                    if (drawnNodes.has(idx)) return;
                    
                    // Mark all nearby nodes as drawn
                    this.pathNodes.forEach((otherNode, otherIdx) => {
                        const dist = Math.sqrt(
                            (node.x - otherNode.x) ** 2 + (node.y - otherNode.y) ** 2
                        );
                        if (dist < 1) {
                            drawnNodes.add(otherIdx);
                        }
                    });
                    
                    const circle = document.createElementNS(svgNS, 'circle');
                    circle.setAttribute('cx', node.x);
                    circle.setAttribute('cy', node.y);
                    circle.setAttribute('r', 12 / this.zoom);
                    circle.setAttribute('fill', '#4a90e2');
                    this.canvas.appendChild(circle);
                });
                
                // Heatmap section badges: walk each user-drawn path segment in order,
                // and split it into "sections" only at SOURCE-stub junctions (and the
                // pathSegment's own endpoints). T-junctions where the perpendicular leg
                // leads to a sink-only furniture (e.g. a destination shelve) are NOT
                // section boundaries, so the badge in the middle reflects ALL distinct
                // links flowing through the section.
                if (this.showAllPaths && heatmap && heatmap.segments.length > 0) {
                    // Fast lookup: segment key -> heatmap entry (with .links Set).
                    const segByKey = new Map();
                    heatmap.segments.forEach(seg => {
                        const ka = `${seg.a.x.toFixed(1)},${seg.a.y.toFixed(1)}`;
                        const kb = `${seg.b.x.toFixed(1)},${seg.b.y.toFixed(1)}`;
                        const key = ka < kb ? `${ka}|${kb}` : `${kb}|${ka}`;
                        segByKey.set(key, seg);
                    });
                    const boundaryPoints = heatmap.sourceBoundaryPoints || new Set();
                    
                    const badgeRadius = 60 / this.zoom;
                    const badgeFontSize = 70 / this.zoom;
                    const badgeStroke = 5 / this.zoom;
                    
                    this.pathSegments.forEach(pseg => {
                        const dx = pseg.end.x - pseg.start.x;
                        const dy = pseg.end.y - pseg.start.y;
                        const segLen2 = dx * dx + dy * dy;
                        if (segLen2 === 0) return;
                        
                        // Collect dense nodes lying on this user-drawn path segment,
                        // sorted by their projection along it.
                        const nodesOn = this.pathNodes.filter(n => {
                            const t = ((n.x - pseg.start.x) * dx + (n.y - pseg.start.y) * dy) / segLen2;
                            if (t < -0.01 || t > 1.01) return false;
                            const projX = pseg.start.x + t * dx;
                            const projY = pseg.start.y + t * dy;
                            return Math.sqrt((n.x - projX) ** 2 + (n.y - projY) ** 2) < 1;
                        }).slice().sort((a, b) => {
                            const ta = (a.x - pseg.start.x) * dx + (a.y - pseg.start.y) * dy;
                            const tb = (b.x - pseg.start.x) * dx + (b.y - pseg.start.y) * dy;
                            return ta - tb;
                        });
                        
                        if (nodesOn.length < 2) return;
                        
                        // Walk consecutive node pairs and partition into runs that end
                        // at boundary points. Within each run, the section's "count"
                        // is the number of DISTINCT links touching any sub-segment.
                        const sections = []; // {startNode, endNode, count}
                        let runStart = nodesOn[0];
                        let runLinks = new Set();
                        
                        const flushRun = (endNode) => {
                            if (runLinks.size > 0) {
                                sections.push({
                                    startNode: runStart,
                                    endNode: endNode,
                                    count: runLinks.size
                                });
                            }
                            runStart = endNode;
                            runLinks = new Set();
                        };
                        
                        for (let i = 0; i < nodesOn.length - 1; i++) {
                            const a = nodesOn[i];
                            const b = nodesOn[i + 1];
                            const ka = `${a.x.toFixed(1)},${a.y.toFixed(1)}`;
                            const kb = `${b.x.toFixed(1)},${b.y.toFixed(1)}`;
                            const key = ka < kb ? `${ka}|${kb}` : `${kb}|${ka}`;
                            const seg = segByKey.get(key);
                            if (seg && seg.links) {
                                seg.links.forEach(l => runLinks.add(l));
                            }
                            
                            // Close the run when we cross a source-stub boundary
                            // (but skip the very last node — it's handled below).
                            if (i < nodesOn.length - 2 && boundaryPoints.has(kb)) {
                                flushRun(b);
                            }
                        }
                        // Close the final run
                        flushRun(nodesOn[nodesOn.length - 1]);
                        
                        // Render badge at the midpoint of each section.
                        sections.forEach(s => {
                            const midX = (s.startNode.x + s.endNode.x) / 2;
                            const midY = (s.startNode.y + s.endNode.y) / 2;
                            
                            const circle = document.createElementNS(svgNS, 'circle');
                            circle.setAttribute('cx', midX);
                            circle.setAttribute('cy', midY);
                            circle.setAttribute('r', badgeRadius);
                            circle.setAttribute('fill', '#ffffff');
                            circle.setAttribute('stroke', '#aa0000');
                            circle.setAttribute('stroke-width', badgeStroke);
                            this.canvas.appendChild(circle);
                            
                            const label = document.createElementNS(svgNS, 'text');
                            label.setAttribute('x', midX);
                            label.setAttribute('y', midY);
                            label.setAttribute('text-anchor', 'middle');
                            label.setAttribute('dominant-baseline', 'central');
                            label.setAttribute('font-size', badgeFontSize);
                            label.setAttribute('font-weight', 'bold');
                            label.setAttribute('font-family', 'sans-serif');
                            label.setAttribute('fill', '#aa0000');
                            label.textContent = s.count;
                            this.canvas.appendChild(label);
                        });
                    });
                }
            }
            
            findLinkedFurniture(asset) {
                if (!asset.name2) return null;
                return this.assets.find(a => a.name === asset.name2);
            }
            
            findNearestNode(position) {
                let minDist = Infinity;
                let nearest = null;
                
                this.pathNodes.forEach(node => {
                    const dist = Math.sqrt(
                        (position.x - node.x) ** 2 + (position.y - node.y) ** 2
                    );
                    if (dist < minDist) {
                        minDist = dist;
                        nearest = node;
                    }
                });
                
                return nearest;
            }
            
            findShortestPathBetweenFurniture(furniture1, furniture2) {
                // Calculate front edge position based on rotation
                const getFrontPosition = (furniture) => {
                    const angle = furniture.rotation * Math.PI / 180;
                    // Front is at the top edge (negative Y direction in local space)
                    // In local space, front is at (0, -halfHeight)
                    const halfH = furniture.height / 2;
                    const frontX = furniture.x - Math.sin(angle) * halfH;
                    const frontY = furniture.y - Math.cos(angle) * halfH;
                    return {x: frontX, y: frontY};
                };
                
                const startNode = this.findNearestNode(getFrontPosition(furniture1));
                const endNode = this.findNearestNode(getFrontPosition(furniture2));
                
                if (!startNode || !endNode) return null;
                
                const graph = this.buildPathGraph();
                return this.findShortestPath(startNode, endNode, graph);
            }
            
            buildPathGraph() {
                const graph = new Map();
                
                // Initialize all nodes
                this.pathNodes.forEach(node => {
                    const key = `${node.x.toFixed(1)},${node.y.toFixed(1)}`;
                    if (!graph.has(key)) {
                        graph.set(key, { x: node.x, y: node.y, neighbors: [] });
                    }
                });
                
                // Connect nodes along segments
                this.pathSegments.forEach(segment => {
                    const dx = segment.end.x - segment.start.x;
                    const dy = segment.end.y - segment.start.y;
                    const segmentLength = Math.sqrt(dx * dx + dy * dy);
                    
                    // Find nodes along this segment
                    const nodesOnSegment = this.pathNodes.filter(node => {
                        // Check if node is on this segment
                        const t = ((node.x - segment.start.x) * dx + (node.y - segment.start.y) * dy) / (segmentLength * segmentLength);
                        if (t < -0.01 || t > 1.01) return false;
                        
                        const projX = segment.start.x + t * dx;
                        const projY = segment.start.y + t * dy;
                        const dist = Math.sqrt((node.x - projX) ** 2 + (node.y - projY) ** 2);
                        return dist < 1;
                    });
                    
                    // Sort nodes by distance along segment
                    nodesOnSegment.sort((a, b) => {
                        const distA = (a.x - segment.start.x) * dx + (a.y - segment.start.y) * dy;
                        const distB = (b.x - segment.start.x) * dx + (b.y - segment.start.y) * dy;
                        return distA - distB;
                    });
                    
                    // Connect consecutive nodes
                    for (let i = 0; i < nodesOnSegment.length - 1; i++) {
                        const key1 = `${nodesOnSegment[i].x.toFixed(1)},${nodesOnSegment[i].y.toFixed(1)}`;
                        const key2 = `${nodesOnSegment[i+1].x.toFixed(1)},${nodesOnSegment[i+1].y.toFixed(1)}`;
                        
                        if (graph.has(key1) && graph.has(key2)) {
                            const node1 = graph.get(key1);
                            const node2 = graph.get(key2);
                            
                            if (!node1.neighbors.some(n => n === node2)) {
                                node1.neighbors.push(node2);
                            }
                            if (!node2.neighbors.some(n => n === node1)) {
                                node2.neighbors.push(node1);
                            }
                        }
                    }
                });
                
                return graph;
            }
            
            findShortestPath(startNode, endNode, graph) {
                const distances = new Map();
                const previous = new Map();
                const unvisited = new Set();
                
                // Initialize
                graph.forEach((node, key) => {
                    distances.set(key, Infinity);
                    unvisited.add(key);
                });
                
                const startKey = `${startNode.x.toFixed(1)},${startNode.y.toFixed(1)}`;
                const endKey = `${endNode.x.toFixed(1)},${endNode.y.toFixed(1)}`;
                distances.set(startKey, 0);
                
                while (unvisited.size > 0) {
                    // Find node with minimum distance
                    let minKey = null;
                    let minDist = Infinity;
                    unvisited.forEach(key => {
                        if (distances.get(key) < minDist) {
                            minDist = distances.get(key);
                            minKey = key;
                        }
                    });
                    
                    if (minKey === null || minDist === Infinity) break;
                    if (minKey === endKey) break;
                    
                    unvisited.delete(minKey);
                    const current = graph.get(minKey);
                    
                    // Update neighbors
                    current.neighbors.forEach(neighbor => {
                        const neighborKey = `${neighbor.x.toFixed(1)},${neighbor.y.toFixed(1)}`;
                        const dist = Math.sqrt(
                            (current.x - neighbor.x) ** 2 + (current.y - neighbor.y) ** 2
                        );
                        const alt = distances.get(minKey) + dist;
                        
                        if (alt < distances.get(neighborKey)) {
                            distances.set(neighborKey, alt);
                            previous.set(neighborKey, minKey);
                        }
                    });
                }
                
                // Reconstruct path
                const path = [];
                let current = endKey;
                
                while (current) {
                    const node = graph.get(current);
                    path.unshift(node);
                    current = previous.get(current);
                }
                
                return path.length > 1 ? path : null;
            }

            // Footer Bar Functions
            saveState() {
                // Remove any future history if we're not at the end
                if (this.historyIndex < this.history.length - 1) {
                    this.history = this.history.slice(0, this.historyIndex + 1);
                }
                
                // Save current state
                const state = {
                    walls: JSON.parse(JSON.stringify(this.walls)),
                    assets: JSON.parse(JSON.stringify(this.assets)),
                    pathSegments: JSON.parse(JSON.stringify(this.pathSegments)),
                    texts: JSON.parse(JSON.stringify(this.texts)),
                    rulers: JSON.parse(JSON.stringify(this.rulers))
                };
                
                this.history.push(state);
                
                // Limit history size
                if (this.history.length > this.maxHistorySize) {
                    this.history.shift();
                } else {
                    this.historyIndex++;
                }
                
                this.updateUndoRedoButtons();
                this.updateFooterCounts();
            }

            undo() {
                if (this.historyIndex > 0) {
                    this.historyIndex--;
                    const state = this.history[this.historyIndex];
                    this.walls = JSON.parse(JSON.stringify(state.walls));
                    this.assets = JSON.parse(JSON.stringify(state.assets));
                    this.pathSegments = JSON.parse(JSON.stringify(state.pathSegments || []));
                    this.texts = JSON.parse(JSON.stringify(state.texts || []));
                    this.rulers = JSON.parse(JSON.stringify(state.rulers || []));
                    // Regenerate nodes from segments
                    this.pathNodes = [];
                    this.pathSegments.forEach(seg => {
                        this.generateNodesAlongSegment(seg.start, seg.end);
                    });
                    this.selectedWall = null;
                    this.selectedAsset = null;
                    this.selectedText = null;
                    this.updateUndoRedoButtons();
                    this.updateFooterCounts();
                    this.updateDeleteButton();
                    this.render();
                }
            }

            redo() {
                if (this.historyIndex < this.history.length - 1) {
                    this.historyIndex++;
                    const state = this.history[this.historyIndex];
                    this.walls = JSON.parse(JSON.stringify(state.walls));
                    this.assets = JSON.parse(JSON.stringify(state.assets));
                    this.pathSegments = JSON.parse(JSON.stringify(state.pathSegments || []));
                    this.texts = JSON.parse(JSON.stringify(state.texts || []));
                    this.rulers = JSON.parse(JSON.stringify(state.rulers || []));
                    // Regenerate nodes from segments
                    this.pathNodes = [];
                    this.pathSegments.forEach(seg => {
                        this.generateNodesAlongSegment(seg.start, seg.end);
                    });
                    this.selectedWall = null;
                    this.selectedAsset = null;
                    this.selectedText = null;
                    this.updateUndoRedoButtons();
                    this.updateFooterCounts();
                    this.updateDeleteButton();
                    this.render();
                }
            }
