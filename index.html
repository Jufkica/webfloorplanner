            // Map a normalized value [0..1] to a jet-style colormap
            // (deep-blue → cyan → green → yellow → red).
            heatmapColor(t) {
                t = Math.max(0, Math.min(1, t));
                let r, g, b;
                if (t < 0.125) {
                    const k = t / 0.125;
                    r = 0; g = 0; b = Math.round(128 + k * 127);
                } else if (t < 0.375) {
                    const k = (t - 0.125) / 0.25;
                    r = 0; g = Math.round(k * 255); b = 255;
                } else if (t < 0.625) {
                    const k = (t - 0.375) / 0.25;
                    r = Math.round(k * 255); g = 255; b = Math.round((1 - k) * 255);
                } else if (t < 0.875) {
                    const k = (t - 0.625) / 0.25;
                    r = 255; g = Math.round((1 - k) * 255); b = 0;
                } else {
                    const k = (t - 0.875) / 0.125;
                    r = Math.round(255 - k * 127); g = 0; b = 0;
                }
                return `rgb(${r},${g},${b})`;
            }
            
            // Render a 2D density heatmap of path usage. Builds a coarse grid over
            // the path-segment bounding box and accumulates Gaussian-kernel
            // contributions from each weighted heatmap segment, then colors each
            // cell with a jet-style colormap.
            drawDensityHeatmap() {
                if (!this.densityHeatmapVisible) return;
                if (this.pathSegments.length === 0) return;
                
                const heatmap = this.computeAllPathsHeatmap();
                if (!heatmap.segments.length || heatmap.maxWeight <= 0) return;
                
                const svgNS = 'http://www.w3.org/2000/svg';
                
                // Bounds: cover all user-drawn paths with a margin so the gradient
                // fades nicely into the background.
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                this.pathSegments.forEach(seg => {
                    minX = Math.min(minX, seg.start.x, seg.end.x);
                    minY = Math.min(minY, seg.start.y, seg.end.y);
                    maxX = Math.max(maxX, seg.start.x, seg.end.x);
                    maxY = Math.max(maxY, seg.start.y, seg.end.y);
                });
                const margin = 100; // 1 m fade margin (just enough for the kernel tail)
                minX -= margin; minY -= margin;
                maxX += margin; maxY += margin;
                
                const cellSize = 20;          // 20 cm per cell (good detail vs perf)
                const sigma = 30;             // kernel bandwidth in cm — tight around paths
                const sigma2 = 2 * sigma * sigma;
                const cutoff = 3 * sigma;     // ignore contributions past 3σ
                
                const cols = Math.max(1, Math.ceil((maxX - minX) / cellSize));
                const rows = Math.max(1, Math.ceil((maxY - minY) / cellSize));
                
                // Density grid (Float32Array for speed).
                const grid = new Float32Array(cols * rows);
                
                heatmap.segments.forEach(seg => {
                    const w = seg.weight;
                    if (w <= 0) return;
                    const sx = seg.a.x, sy = seg.a.y;
                    const ex = seg.b.x, ey = seg.b.y;
                    const dx = ex - sx;
                    const dy = ey - sy;
                    const segLen2 = dx * dx + dy * dy;
                    
                    // Bounding box of this segment expanded by cutoff, mapped to cells.
                    const bMinX = Math.min(sx, ex) - cutoff;
                    const bMaxX = Math.max(sx, ex) + cutoff;
                    const bMinY = Math.min(sy, ey) - cutoff;
                    const bMaxY = Math.max(sy, ey) + cutoff;
                    const c0 = Math.max(0, Math.floor((bMinX - minX) / cellSize));
                    const c1 = Math.min(cols - 1, Math.ceil((bMaxX - minX) / cellSize));
                    const r0 = Math.max(0, Math.floor((bMinY - minY) / cellSize));
                    const r1 = Math.min(rows - 1, Math.ceil((bMaxY - minY) / cellSize));
                    
                    for (let r = r0; r <= r1; r++) {
                        const cy = minY + (r + 0.5) * cellSize;
                        for (let c = c0; c <= c1; c++) {
                            const cx = minX + (c + 0.5) * cellSize;
                            // Closest point on segment.
                            let px, py;
                            if (segLen2 === 0) {
                                px = sx; py = sy;
                            } else {
                                let t = ((cx - sx) * dx + (cy - sy) * dy) / segLen2;
                                if (t < 0) t = 0; else if (t > 1) t = 1;
                                px = sx + t * dx;
                                py = sy + t * dy;
                            }
                            const ddx = cx - px;
                            const ddy = cy - py;
                            const d2 = ddx * ddx + ddy * ddy;
                            grid[r * cols + c] += w * Math.exp(-d2 / sigma2);
                        }
                    }
                });
                
                // Find max for normalization.
                let maxDensity = 0;
                for (let i = 0; i < grid.length; i++) {
                    if (grid[i] > maxDensity) maxDensity = grid[i];
                }
                if (maxDensity <= 0) return;
                
                // Render. Use a single group with a slight blur via opacity + cell
                // overlap to avoid hard edges. Skip near-zero cells so we don't
                // paint the entire bounding box (also limits SVG node count).
                const layer = document.createElementNS(svgNS, 'g');
                layer.setAttribute('opacity', '0.7');
                layer.setAttribute('pointer-events', 'none');
                // Marker so the export color override skips the heatmap layer
                // and preserves its jet colormap.
                layer.setAttribute('data-export-keep-color', '1');
                
                const threshold = 0.08; // skip cells below 8% of peak (trims faint fringe)
                // Slight overlap (1px in world units) hides cell seams when zoomed.
                const drawSize = cellSize + 1;
                
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const v = grid[r * cols + c] / maxDensity;
                        if (v < threshold) continue;
                        const rect = document.createElementNS(svgNS, 'rect');
                        rect.setAttribute('x', minX + c * cellSize);
                        rect.setAttribute('y', minY + r * cellSize);
                        rect.setAttribute('width', drawSize);
                        rect.setAttribute('height', drawSize);
                        rect.setAttribute('fill', this.heatmapColor(v));
                        // Cells fade in slightly with intensity for a smoother look.
                        rect.setAttribute('opacity', (0.55 + 0.45 * v).toFixed(3));
                        layer.appendChild(rect);
                    }
                }
                
                this.canvas.appendChild(layer);
            }
            
            // === Ruler / Annotation Tool ===
            // Draw all stored rulers plus any in-progress ruler preview.
            drawRulers() {
                this.rulers.forEach(r => this.drawRuler(r, false));
                if (this.currentRuler) {
                    this.drawRuler(this.currentRuler, true);
                }
            }
            
            // Render a single ruler line with end-tick marks and a length label.
            drawRuler(ruler, isPreview) {
                const svgNS = 'http://www.w3.org/2000/svg';
                const isSelected = !isPreview && this.selectedRuler === ruler;
                const dx = ruler.end.x - ruler.start.x;
                const dy = ruler.end.y - ruler.start.y;
                const len = Math.sqrt(dx * dx + dy * dy);
                if (len < 0.01) return;
                
                const stroke = isSelected ? '#ff8c00' : (isPreview ? '#9b59b6' : '#7e3fa1');
                const strokeWidth = (isSelected ? 3 : 2) / this.zoom;
                
                // Main measurement line.
                const line = document.createElementNS(svgNS, 'line');
                line.setAttribute('x1', ruler.start.x);
                line.setAttribute('y1', ruler.start.y);
                line.setAttribute('x2', ruler.end.x);
                line.setAttribute('y2', ruler.end.y);
                line.setAttribute('stroke', stroke);
                line.setAttribute('stroke-width', strokeWidth);
                if (isPreview) line.setAttribute('opacity', '0.7');
                this.canvas.appendChild(line);
                
                // Perpendicular tick marks at each endpoint.
                const tickLen = 26 / this.zoom;
                const angle = Math.atan2(dy, dx);
                const perpX = -Math.sin(angle);
                const perpY = Math.cos(angle);
                [ruler.start, ruler.end].forEach(p => {
                    const tick = document.createElementNS(svgNS, 'line');
                    tick.setAttribute('x1', p.x + perpX * tickLen);
                    tick.setAttribute('y1', p.y + perpY * tickLen);
                    tick.setAttribute('x2', p.x - perpX * tickLen);
                    tick.setAttribute('y2', p.y - perpY * tickLen);
                    tick.setAttribute('stroke', stroke);
                    tick.setAttribute('stroke-width', strokeWidth);
                    if (isPreview) tick.setAttribute('opacity', '0.7');
                    this.canvas.appendChild(tick);
                });
                
                // Length label centered above the line.
                const label = len < 100
                    ? `${Math.round(len)} cm`
                    : `${(len / 100).toFixed(2)} m`;
                
                // Rotate text to follow the line, but keep it upright.
                let labelAngleDeg = angle * 180 / Math.PI;
                if (labelAngleDeg > 90) labelAngleDeg -= 180;
                else if (labelAngleDeg < -90) labelAngleDeg += 180;
                
                const offsetDist = 42 / this.zoom;
                const midX = (ruler.start.x + ruler.end.x) / 2 + perpX * offsetDist;
                const midY = (ruler.start.y + ruler.end.y) / 2 + perpY * offsetDist;
                
                const fontSize = 60 / this.zoom;
                const padX = 14 / this.zoom;
                const padY = 7 / this.zoom;
                const approxW = label.length * fontSize * 0.55 + padX * 2;
                const approxH = fontSize + padY * 2;
                
                const labelGroup = document.createElementNS(svgNS, 'g');
                labelGroup.setAttribute('transform', `translate(${midX}, ${midY}) rotate(${labelAngleDeg})`);
                
                const bg = document.createElementNS(svgNS, 'rect');
                bg.setAttribute('x', -approxW / 2);
                bg.setAttribute('y', -approxH / 2);
                bg.setAttribute('width', approxW);
                bg.setAttribute('height', approxH);
                bg.setAttribute('rx', 5 / this.zoom);
                bg.setAttribute('fill', '#ffffff');
                bg.setAttribute('stroke', stroke);
                bg.setAttribute('stroke-width', 2 / this.zoom);
                if (isPreview) bg.setAttribute('opacity', '0.85');
                labelGroup.appendChild(bg);
                
                const text = document.createElementNS(svgNS, 'text');
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'central');
                text.setAttribute('font-size', fontSize);
                text.setAttribute('font-weight', '600');
                text.setAttribute('font-family', 'sans-serif');
                text.setAttribute('fill', stroke);
                text.textContent = label;
                labelGroup.appendChild(text);
                
                this.canvas.appendChild(labelGroup);
            }
            
            // Click-test for ruler selection in select mode.
            getRulerAtPoint(point) {
                const clickRadius = 10;
                for (let i = this.rulers.length - 1; i >= 0; i--) {
                    const r = this.rulers[i];
                    if (this.pointToLineDistance(point, r.start, r.end) < clickRadius) {
                        return r;
                    }
                }
                return null;
            }
            
            // Aggregate per-segment usage across every linked-pair shortest path.
            // Returns { segments, maxWeight, sourceBoundaryPoints }.
            // - Each segment's `weight` = sum of link.multiplier over traversing links.
            // - Each segment's `links` = Set of unique link refs traversing it.
            // - `sourceBoundaryPoints` = node keys where a stub from a SOURCE furniture
            //   (one with outgoing `links`) joins a corridor. These are used as the
            //   only section boundaries when drawing badges, so transit/merge
            //   T-junctions (e.g., where a vertical to a sink furniture connects)
            //   don't fragment the section count.
            computeAllPathsHeatmap() {
                const result = {
                    segments: [],
                    maxWeight: 0,
                    sourceBoundaryPoints: new Set()
                };
                if (this.pathNodes.length === 0 || this.assets.length === 0) return result;
                
                // Build the graph ONCE for all pair lookups.
                const graph = this.buildPathGraph();
                
                const getFrontPosition = (furniture) => {
                    const angle = furniture.rotation * Math.PI / 180;
                    const halfH = furniture.height / 2;
                    return {
                        x: furniture.x - Math.sin(angle) * halfH,
                        y: furniture.y - Math.cos(angle) * halfH
                    };
                };
                
                // Walk from `leafNode` along the path graph (degree<=2 nodes) until
                // we reach a junction (degree>2), and return its key (or null).
                const findCorridorJunction = (leafNode) => {
                    let currKey = `${leafNode.x.toFixed(1)},${leafNode.y.toFixed(1)}`;
                    let prevKey = null;
                    let safety = 10000;
                    while (safety-- > 0) {
                        const node = graph.get(currKey);
                        if (!node) return null;
                        if (node.neighbors.length > 2) return currKey;
                        if (node.neighbors.length === 0) return null;
                        const next = node.neighbors.find(n => {
                            const nkey = `${n.x.toFixed(1)},${n.y.toFixed(1)}`;
                            return nkey !== prevKey;
                        });
                        if (!next) return null;
                        prevKey = currKey;
                        currKey = `${next.x.toFixed(1)},${next.y.toFixed(1)}`;
                    }
                    return null;
                };
                
                const segMap = new Map(); // key -> {a, b, weight, linkCount, links: Set}
                
                this.assets.forEach((asset, assetIdx) => {
                    if (!asset.links || asset.links.length === 0) return;
                    const isFurn = asset.type !== 'door' &&
                                   asset.type !== 'doubleDoor' &&
                                   asset.type !== 'window' &&
                                   asset.type !== 'chair';
                    if (!isFurn) return;
                    
                    const startNode = this.findNearestNode(getFrontPosition(asset));
                    if (!startNode) return;
                    
                    // Mark the corridor junction adjacent to this SOURCE furniture's
                    // stub as a section boundary. The leaf itself is also added so
                    // sections start cleanly at the stub root.
                    const startKey = `${startNode.x.toFixed(1)},${startNode.y.toFixed(1)}`;
                    result.sourceBoundaryPoints.add(startKey);
                    const corridorJunction = findCorridorJunction(startNode);
                    if (corridorJunction) {
                        result.sourceBoundaryPoints.add(corridorJunction);
                    }
                    
                    asset.links.forEach((link, linkIdx) => {
                        if (!link.targetName) return;
                        const target = this.assets.find(a => a.name === link.targetName);
                        if (!target) return;
                        
                        const endNode = this.findNearestNode(getFrontPosition(target));
                        if (!endNode) return;
                        
                        const path = this.findShortestPath(startNode, endNode, graph);
                        if (!path || path.length < 2) return;
                        
                        const weight = link.multiplier || 2;
                        const linkRef = `${asset.id || ('a' + assetIdx)}|${linkIdx}`;
                        
                        for (let i = 0; i < path.length - 1; i++) {
                            const a = path[i];
                            const b = path[i + 1];
                            const ka = `${a.x.toFixed(1)},${a.y.toFixed(1)}`;
                            const kb = `${b.x.toFixed(1)},${b.y.toFixed(1)}`;
                            const key = ka < kb ? `${ka}|${kb}` : `${kb}|${ka}`;
                            
                            let entry = segMap.get(key);
                            if (!entry) {
                                entry = { a, b, weight: 0, linkCount: 0, links: new Set() };
                                segMap.set(key, entry);
                            }
                            entry.weight += weight;
                            entry.links.add(linkRef);
                            entry.linkCount = entry.links.size;
                            if (entry.weight > result.maxWeight) {
                                result.maxWeight = entry.weight;
                            }
                        }
                    });
                });
                
                result.segments = Array.from(segMap.values());
                return result;
            }

            clearAll() {
                if (confirm('Are you sure you want to clear all walls and objects?')) {
                    this.walls = [];

                    this.selectedWall = null;
                    this.selectedAsset = null;
                    this.selectedText = null;
                    this.selectedRuler = null;
                    this.saveState();
                    this.updateDeleteButton();
                    this.render();
                }
            }

            takeScreenshot() {
                // Export current view as PNG
                const svgData = new XMLSerializer().serializeToString(this.canvas);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();
                
                canvas.width = this.canvas.getBoundingClientRect().width;
                canvas.height = this.canvas.getBoundingClientRect().height;
                
                img.onload = () => {
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    
                    canvas.toBlob((blob) => {
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = 'floor-plan-screenshot.png';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(url);
                    });
                };
                
                img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
            }

            showDimensionDebugInfo() {
                let debugInfo = '=== DIMENSION DEBUG INFO ===\n\n';
                
                this.walls.forEach((wall, wallIdx) => {
                    const dx = wall.end.x - wall.start.x;
                    const dy = wall.end.y - wall.start.y;
                    const calculatedLength = Math.sqrt(dx * dx + dy * dy);
                    const renderedLength = Math.round(calculatedLength);
                    
                    debugInfo += `WALL ${wallIdx}:\n`;
                    debugInfo += `  Start: (${wall.start.x.toFixed(1)}, ${wall.start.y.toFixed(1)})\n`;
                    debugInfo += `  End: (${wall.end.x.toFixed(1)}, ${wall.end.y.toFixed(1)})\n`;
                    debugInfo += `  Calculated Length: ${calculatedLength.toFixed(2)} cm\n`;
                    debugInfo += `  Rendered Length: ${renderedLength} cm\n`;
                    debugInfo += `  Angle: ${(Math.atan2(dy, dx) * 180 / Math.PI).toFixed(1)}°\n`;
                    
                    // Check for T-junctions
                    const junctions = this.findTJunctions(wall);
                    if (junctions.length > 0) {
                        debugInfo += `  T-Junctions: ${junctions.length}\n`;
                        junctions.forEach((junction, jIdx) => {
                            debugInfo += `    J${jIdx}: (${junction.point.x.toFixed(1)}, ${junction.point.y.toFixed(1)}) at t=${junction.t.toFixed(3)}\n`;
                        });
                        
                        // Calculate segment lengths
                        const points = [wall.start, ...junctions.map(j => j.point), wall.end];
                        points.sort((a, b) => {
                            const tA = ((a.x - wall.start.x) * dx + (a.y - wall.start.y) * dy) / (calculatedLength * calculatedLength);
                            const tB = ((b.x - wall.start.x) * dx + (b.y - wall.start.y) * dy) / (calculatedLength * calculatedLength);
                            return tA - tB;
                        });
                        
                        debugInfo += `  Segments:\n`;
                        for (let i = 0; i < points.length - 1; i++) {
                            const segDx = points[i + 1].x - points[i].x;
                            const segDy = points[i + 1].y - points[i].y;
                            const segLength = Math.sqrt(segDx * segDx + segDy * segDy);
                            const segRendered = Math.round(segLength);
                            debugInfo += `    Seg ${i}: ${segLength.toFixed(2)} cm (rendered: ${segRendered} cm)\n`;
                        }
                    }
                    
                    // Check for connections at endpoints
                    const startConnections = this.getConnectedWallsAtEndpoint(wall.start, wall);
                    const endConnections = this.getConnectedWallsAtEndpoint(wall.end, wall);
                    const startTJunction = this.checkPointOnWall(wall.start, wall);
                    const endTJunction = this.checkPointOnWall(wall.end, wall);
                    
                    if (startConnections.length > 0 || startTJunction) {
                        debugInfo += `  Start: ${startConnections.length} corner connection(s)`;
                        if (startTJunction) debugInfo += ' + T-junction';
                        debugInfo += '\n';
                    }
                    if (endConnections.length > 0 || endTJunction) {
                        debugInfo += `  End: ${endConnections.length} corner connection(s)`;
                        if (endTJunction) debugInfo += ' + T-junction';
                        debugInfo += '\n';
                    }
                    
                    debugInfo += '\n';
                });
                
                debugInfo += `\nWall Thickness: ${this.WALL_THICKNESS} cm\n`;
                debugInfo += `Zoom Level: ${Math.round((this.zoom / 8) * 100)}%\n`;
                
                // Show in console with nice formatting
                console.log(debugInfo);
                
                // Also show alert with option to copy
                const shouldCopy = confirm(debugInfo + '\nDimension info logged to console.\n\nClick OK to copy to clipboard.');
                if (shouldCopy) {
                    navigator.clipboard.writeText(debugInfo).then(() => {
                        alert('Debug info copied to clipboard!');
                    }).catch(() => {
                        alert('Could not copy to clipboard. Check console for full output.');
                    });
                }
            }

                // Diagonal line

                // Draw alignment guide in hover mode
                if (this.alignmentGuide && !this.isDrawing) {
                    const guideLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    guideLine.setAttribute('x1', this.alignmentGuide.from.x);
                    guideLine.setAttribute('y1', this.alignmentGuide.from.y);
                    guideLine.setAttribute('x2', this.alignmentGuide.to.x);
                    guideLine.setAttribute('y2', this.alignmentGuide.to.y);

                    circle.setAttribute('cy', this.hoverPoint.y);

            drawAlignmentGuides(currentWall) {
                // Check if current wall is aligned (90° or 45°) to any existing wall endpoints
                if (!currentWall || this.walls.length === 0) return;
                
                const dx = currentWall.end.x - currentWall.start.x;
                const dy = currentWall.end.y - currentWall.start.y;
                const currentAngle = Math.atan2(dy, dx);
                
                for (const wall of this.walls) {
                    // Check both endpoints of existing walls
                    [wall.start, wall.end].forEach(endpoint => {
                        // Calculate angle from this endpoint to current wall start
                        const toDx = currentWall.start.x - endpoint.x;
                        const toDy = currentWall.start.y - endpoint.y;
                        const toAngle = Math.atan2(toDy, toDx);
                        
                        // Check if current wall direction is perpendicular or 45° to the line from endpoint
                        const angleDiff = Math.abs(currentAngle - toAngle) * 180 / Math.PI;
                        const normalizedDiff = Math.abs((angleDiff + 180) % 360 - 180);
                        
                        // Check for 90° or 45° alignment
                        const tolerance = 5;
                        const isAligned = 
                            Math.abs(normalizedDiff - 90) < tolerance || 
                            Math.abs(normalizedDiff - 45) < tolerance ||
                            Math.abs(normalizedDiff - 135) < tolerance;
                        
                        if (isAligned) {
                            // Draw green dotted guide line from endpoint to current wall start
                            const guideLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                            guideLine.setAttribute('x1', endpoint.x);
                            guideLine.setAttribute('y1', endpoint.y);
                            guideLine.setAttribute('x2', currentWall.start.x);
                            guideLine.setAttribute('y2', currentWall.start.y);
                            guideLine.setAttribute('stroke', '#00ff00');
                            guideLine.setAttribute('stroke-width', 2 / this.zoom);
                            guideLine.setAttribute('stroke-dasharray', `${10 / this.zoom},${5 / this.zoom}`);
                            guideLine.setAttribute('opacity', '0.7');
                            this.canvas.appendChild(guideLine);
                        }
                    });
                }
            }

            drawGrid() {
                if (!this.gridVisible) return; // Skip if grid is hidden
                
                const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                
                // Calculate visible grid range
                const startX = Math.floor(this.viewBox.x / this.GRID_MAJOR) * this.GRID_MAJOR;
                const endX = Math.ceil((this.viewBox.x + this.viewBox.width) / this.GRID_MAJOR) * this.GRID_MAJOR;
                const startY = Math.floor(this.viewBox.y / this.GRID_MAJOR) * this.GRID_MAJOR;
                const endY = Math.ceil((this.viewBox.y + this.viewBox.height) / this.GRID_MAJOR) * this.GRID_MAJOR;
                
                // Draw minor grid (10cm)
                for (let x = startX; x <= endX; x += this.GRID_MINOR) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x);
                    line.setAttribute('y1', startY);
                    line.setAttribute('x2', x);
                    line.setAttribute('y2', endY);
                    line.setAttribute('stroke', '#bfbfbf');
                    line.setAttribute('stroke-width', 1 / this.zoom);
                    group.appendChild(line);
                }
                
                for (let y = startY; y <= endY; y += this.GRID_MINOR) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', startX);
                    line.setAttribute('y1', y);
                    line.setAttribute('x2', endX);
                    line.setAttribute('y2', y);
                    line.setAttribute('stroke', '#bfbfbf');
                    line.setAttribute('stroke-width', 1 / this.zoom);
                    group.appendChild(line);
                }
                
                // Draw major grid (100cm)
                for (let x = startX; x <= endX; x += this.GRID_MAJOR) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x);
                    line.setAttribute('y1', startY);
                    line.setAttribute('x2', x);
                    line.setAttribute('y2', endY);
                    line.setAttribute('stroke', '#adadad');
                    line.setAttribute('stroke-width', 2 / this.zoom);
                    group.appendChild(line);
                }
                
                for (let y = startY; y <= endY; y += this.GRID_MAJOR) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', startX);
                    line.setAttribute('y1', y);
                    line.setAttribute('x2', endX);
                    line.setAttribute('y2', y);
                    line.setAttribute('stroke', '#adadad');
                    line.setAttribute('stroke-width', 2 / this.zoom);
                    group.appendChild(line);
                }
                
                this.canvas.appendChild(group);
            }

            drawTexts() {
                const svgNS = 'http://www.w3.org/2000/svg';
                
                this.texts.forEach(text => {
                    const group = document.createElementNS(svgNS, 'g');
                    group.setAttribute('transform', `translate(${text.x}, ${text.y}) rotate(${text.rotation})`);
                    
                    // Create text element
                    const textElement = document.createElementNS(svgNS, 'text');
                    textElement.setAttribute('text-anchor', 'middle');
                    textElement.setAttribute('dominant-baseline', 'middle');
                    textElement.setAttribute('font-family', 'SimplexCAD, sans-serif');
                    textElement.setAttribute('font-size', text.size);
                    textElement.setAttribute('fill', text.color);
                    textElement.textContent = text.content;
                    group.appendChild(textElement);
                    
                    // Draw selection highlight
                    if (this.selectedText === text) {
                        const bbox = textElement.getBBox ? textElement.getBBox() : {
                            x: -50, y: -text.size / 2, width: 100, height: text.size
                        };
                        
                        const rect = document.createElementNS(svgNS, 'rect');
                        rect.setAttribute('x', bbox.x - 5);
                        rect.setAttribute('y', bbox.y - 5);
                        rect.setAttribute('width', bbox.width + 10);
                        rect.setAttribute('height', bbox.height + 10);
                        rect.setAttribute('fill', 'none');
                        rect.setAttribute('stroke', '#ff8c00');
                        rect.setAttribute('stroke-width', 3 / this.zoom);
                        rect.setAttribute('stroke-dasharray', `${10 / this.zoom},${5 / this.zoom}`);
                        group.appendChild(rect);
                    }
                    
                    this.canvas.appendChild(group);
                });
            }
            
            drawAssets() {
                // Find all linked furniture if there's a selected asset
                const linkedFurnitureSet = new Set();
                if (this.selectedAsset && this.selectedAsset.links) {
                    this.selectedAsset.links.forEach(link => {
                        if (link.targetName) {
                            const linkedAsset = this.assets.find(a => a.name === link.targetName);
                            if (linkedAsset) {
                                linkedFurnitureSet.add(linkedAsset);
                            }
                        }
                    });
                }
                
                // Draw all placed assets
                this.assets.forEach(asset => {
                    const isMultiSelected = this.selectedAssets.includes(asset);
                    const isLinked = linkedFurnitureSet.has(asset);
                    this.drawAsset(asset, false, false, isMultiSelected, isLinked);
                });
                
                // Draw selected asset highlight (single selection)
                if (this.selectedAsset) {
                    this.drawAsset(this.selectedAsset, true);
                }
                
                // Draw current asset preview
                if (this.currentAsset) {
                    this.drawAsset(this.currentAsset, false, true);
                }
            }

            drawAsset(asset, selected = false, preview = false, multiSelected = false, linkedHighlight = false) {
                const svgNS = 'http://www.w3.org/2000/svg';
                const group = document.createElementNS(svgNS, 'g');
                group.setAttribute('transform', `translate(${asset.x}, ${asset.y}) rotate(${asset.rotation})`);
                
                const opacity = preview ? 0.6 : 1;
                
                // Draw based on asset type
                switch (asset.type) {
                    case 'door':
                    case 'doubleDoor':
                        this.drawDoor(group, asset, opacity);
                        break;
                    case 'window':
                        this.drawWindow(group, asset, opacity);
                        break;
                    case 'table':
                        this.drawTable(group, asset, opacity);
                        break;
                    case 'chair':
                        this.drawChair(group, asset, opacity);
                        break;
                    case 'bed':
                        this.drawBed(group, asset, opacity);
                        break;
                    case 'sofa':
                        this.drawSofa(group, asset, opacity);
                        break;
                    case 'desk':
                        this.drawDesk(group, asset, opacity);
                        break;
                    case 'cabinet':
                        this.drawCabinet(group, asset, opacity);
                        break;
                    case 'emergencyExit':
                    case 'fireExtinguisher':
                    case 'firstAidKit':
                    case 'assemblyPoint':
                    case 'fireAlarm':
                    case 'fireHose':
                        this.drawSafetyIcon(group, asset, opacity);
                        break;
                }
                
                // Draw linked furniture highlight (red)
                if (linkedHighlight) {
                    const rect = document.createElementNS(svgNS, 'rect');
                    rect.setAttribute('x', -asset.width / 2);
                    rect.setAttribute('y', -asset.height / 2);
                    rect.setAttribute('width', asset.width);
                    rect.setAttribute('height', asset.height);
                    rect.setAttribute('fill', 'none');
                    rect.setAttribute('stroke', '#ff4444');
                    rect.setAttribute('stroke-width', 18 / this.zoom);
                    rect.setAttribute('stroke-dasharray', `${10 / this.zoom},${5 / this.zoom}`);
                    group.appendChild(rect);
                }
                
                // Draw multi-selection highlight (simpler, no rotation handle)
                if (multiSelected) {
                    const rect = document.createElementNS(svgNS, 'rect');
                    rect.setAttribute('x', -asset.width / 2);
                    rect.setAttribute('y', -asset.height / 2);
                    rect.setAttribute('width', asset.width);
                    rect.setAttribute('height', asset.height);
                    rect.setAttribute('fill', 'none');
                    rect.setAttribute('stroke', '#4a90e2');
                    rect.setAttribute('stroke-width', 3 / this.zoom);
                    rect.setAttribute('stroke-dasharray', `${10 / this.zoom},${5 / this.zoom}`);
                    group.appendChild(rect);
                }
                
                // Draw selection highlight (single selection with rotation handle)
                if (selected) {
                    const rect = document.createElementNS(svgNS, 'rect');
                    rect.setAttribute('x', -asset.width / 2);
                    rect.setAttribute('y', -asset.height / 2);
                    rect.setAttribute('width', asset.width);
                    rect.setAttribute('height', asset.height);
                    rect.setAttribute('fill', 'none');
                    rect.setAttribute('stroke', '#ff8c00');
                    rect.setAttribute('stroke-width', 3 / this.zoom);
                    rect.setAttribute('stroke-dasharray', `${10 / this.zoom},${5 / this.zoom}`);
                    group.appendChild(rect);
                    
                    // === Rotation handle (redesigned: bigger circle + symmetric circular-arrow icon) ===
                    // NOTE: Keep handleDistance / handleRadius in sync with isPointOnRotationHandle().
                    const handleDistance = 130 / this.zoom; // Gap between object edge and handle center
                    const handleRadius = 52 / this.zoom;    // Visible circle radius
                    const halfH = asset.height / 2;
                    const handleY = -(halfH + handleDistance);
                    const accent = '#ff8c00';
                    
                    // Connector line from top edge of object up to the handle circle
                    const line = document.createElementNS(svgNS, 'line');
                    line.setAttribute('x1', 0);
                    line.setAttribute('y1', -halfH);
                    line.setAttribute('x2', 0);
                    line.setAttribute('y2', handleY + handleRadius);
                    line.setAttribute('stroke', accent);
                    line.setAttribute('stroke-width', 6 / this.zoom);
                    line.setAttribute('stroke-linecap', 'round');
                    group.appendChild(line);
                    
                    // Handle background circle
                    const handle = document.createElementNS(svgNS, 'circle');
                    handle.setAttribute('cx', 0);
                    handle.setAttribute('cy', handleY);
                    handle.setAttribute('r', handleRadius);
                    handle.setAttribute('fill', '#fff');
                    handle.setAttribute('stroke', accent);
                    handle.setAttribute('stroke-width', 7 / this.zoom);
                    handle.setAttribute('cursor', 'grab');
                    group.appendChild(handle);
                    
                    // Symmetric circular-arrow icon, centered on (0, handleY).
                    // Arc spans 270° clockwise with the GAP at the top, so both endpoints
                    // sit symmetrically on either side of the vertical axis -> looks centered.
                    const iconR = handleRadius * 0.48;
                    const iconStroke = 7 / this.zoom;
                    const arrowSize = 14 / this.zoom;
                    const SQRT2_2 = Math.SQRT1_2; // ~0.7071
                    
                    // Endpoints at SVG angles 315° (top-right) and 225° (top-left).
                    const startX = iconR * SQRT2_2;
                    const startY = handleY - iconR * SQRT2_2;
                    const endX = -iconR * SQRT2_2;
                    const endY = handleY - iconR * SQRT2_2;
                    
                    const arc = document.createElementNS(svgNS, 'path');
                    arc.setAttribute('d',
                        `M ${startX} ${startY} ` +
                        `A ${iconR} ${iconR} 0 1 1 ${endX} ${endY}`);
                    arc.setAttribute('fill', 'none');
                    arc.setAttribute('stroke', accent);
                    arc.setAttribute('stroke-width', iconStroke);
                    arc.setAttribute('stroke-linecap', 'round');
                    arc.setAttribute('cursor', 'grab');
                    group.appendChild(arc);
                    
                    // Arrowhead at end (top-left), pointing tangentially up-and-right.
                    // Tangent direction at angle 225° going clockwise = (+sin225, -cos225) ~ (-0.707, +0.707)?
                    // Actually clockwise tangent at SVG angle a is (-sin a, cos a). At a=225°: (0.707, -0.707).
                    // We want the arrow to point AGAINST motion (back along the arc visually) so it reads as
                    // a rotation indicator: tip points up-and-left away from the arc end.
                    const tipDirX = -SQRT2_2; // up-left
                    const tipDirY = -SQRT2_2;
                    const perpX = -tipDirY;   // perpendicular to tip direction
                    const perpY =  tipDirX;
                    const tipX = endX + tipDirX * arrowSize;
                    const tipY = endY + tipDirY * arrowSize;
                    const baseHalf = arrowSize * 0.55;
                    const b1x = endX + perpX * baseHalf;
                    const b1y = endY + perpY * baseHalf;
                    const b2x = endX - perpX * baseHalf;
                    const b2y = endY - perpY * baseHalf;
                    
                    const arrow = document.createElementNS(svgNS, 'path');
                    arrow.setAttribute('d',
                        `M ${tipX} ${tipY} ` +
                        `L ${b1x} ${b1y} ` +
                        `L ${b2x} ${b2y} Z`);

            drawWalls() {
                // Draw all walls as a single connected path for clean joins
                if (this.walls.length === 0) return;
                
                // Create outline path
                const outlineGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                const outline = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                let outlineD = '';
                
                // Create fill path
                const fillGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                const fill = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                let fillD = '';
                
                this.walls.forEach(wall => {
                    outlineD += `M ${wall.start.x} ${wall.start.y} L ${wall.end.x} ${wall.end.y} `;
                    fillD += `M ${wall.start.x} ${wall.start.y} L ${wall.end.x} ${wall.end.y} `;
                });
                
                // Draw outline first (behind)
                outline.setAttribute('d', outlineD);
                outline.setAttribute('stroke', '#000');
                outline.setAttribute('stroke-width', this.WALL_THICKNESS + 12 / this.zoom);
                outline.setAttribute('stroke-linecap', 'square');
                outline.setAttribute('stroke-linejoin', 'miter');
                outline.setAttribute('fill', 'none');
                outlineGroup.appendChild(outline);
                this.canvas.appendChild(outlineGroup);
                
                // Draw fill on top
                fill.setAttribute('d', fillD);
                fill.setAttribute('stroke', 'url(#wallPattern)');
                fill.setAttribute('stroke-width', this.WALL_THICKNESS);
                fill.setAttribute('stroke-linecap', 'square');
                fill.setAttribute('stroke-linejoin', 'miter');
                fill.setAttribute('fill', 'none');
                fillGroup.appendChild(fill);
                this.canvas.appendChild(fillGroup);
                
                // Draw selected wall highlight if any
                if (this.selectedWall) {
                    const selectedPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    selectedPath.setAttribute('d', `M ${this.selectedWall.start.x} ${this.selectedWall.start.y} L ${this.selectedWall.end.x} ${this.selectedWall.end.y}`);
                    selectedPath.setAttribute('stroke', '#ff8c00');
                    selectedPath.setAttribute('stroke-width', this.WALL_THICKNESS + 8 / this.zoom);
                    selectedPath.setAttribute('stroke-linecap', 'square');
                    selectedPath.setAttribute('stroke-linejoin', 'miter');
                    selectedPath.setAttribute('fill', 'none');
                    selectedPath.setAttribute('opacity', '0.5');
                    this.canvas.appendChild(selectedPath);
                    
                    // Draw anchor points for selected wall
                    this.drawWallAnchors(this.selectedWall);
                }
                
                // Draw dimensions for each wall
                this.walls.forEach((wall, index) => {
                    this.drawWallDimension(wall, index);
                });
            }
