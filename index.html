            drawWallDimension(wall, wallIndex = -1) {
                // Skip wall dimensions entirely when an export run requested it.
                if (this.exportHideDimensions) return;
                const dx = wall.end.x - wall.start.x;
                const dy = wall.end.y - wall.start.y;
                const length = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx);
                
                // Calculate perpendicular unit vector
                const perpX = -Math.sin(angle);
                const perpY = Math.cos(angle);
                
                const halfThick = this.WALL_THICKNESS / 2;
                
                // Check for endpoint connections (corners)
                const startConnections = this.getConnectedWallsAtEndpoint(wall.start, wall);
                const endConnections = this.getConnectedWallsAtEndpoint(wall.end, wall);
                
                // Check if this wall's endpoints form T-junctions with other walls
                const startTJunction = this.checkPointOnWall(wall.start, wall);
                const endTJunction = this.checkPointOnWall(wall.end, wall);
                
                // Find T-junction points along this wall (other walls connecting to this wall's centerline)
                const junctions = this.findTJunctions(wall);
                
                // Calculate inner edge points - account for corner connections AND T-junctions
                let innerStartX = wall.start.x + perpX * halfThick;
                let innerStartY = wall.start.y + perpY * halfThick;
                let innerEndX = wall.end.x + perpX * halfThick;
                let innerEndY = wall.end.y + perpY * halfThick;
                
                // Adjust for corner connections OR T-junctions (both shorten by wall thickness)
                if (startConnections.length > 0 || startTJunction) {
                    innerStartX = wall.start.x + Math.cos(angle) * this.WALL_THICKNESS + perpX * halfThick;
                    innerStartY = wall.start.y + Math.sin(angle) * this.WALL_THICKNESS + perpY * halfThick;
                }
                
                if (endConnections.length > 0 || endTJunction) {
                    innerEndX = wall.end.x - Math.cos(angle) * this.WALL_THICKNESS + perpX * halfThick;
                    innerEndY = wall.end.y - Math.sin(angle) * this.WALL_THICKNESS + perpY * halfThick;
                }
                
                // For walls without corners, both sides get full dimension
                // Calculate edge points for BOTH sides
                const side1StartX = wall.start.x + perpX * halfThick;
                const side1StartY = wall.start.y + perpY * halfThick;
                const side1EndX = wall.end.x + perpX * halfThick;
                const side1EndY = wall.end.y + perpY * halfThick;
                
                const side2StartX = wall.start.x - perpX * halfThick;
                const side2StartY = wall.start.y - perpY * halfThick;
                const side2EndX = wall.end.x - perpX * halfThick;
                const side2EndY = wall.end.y - perpY * halfThick;
                
                // Calculate actual lengths from wall edges
                const side1Dx = side1EndX - side1StartX;
                const side1Dy = side1EndY - side1StartY;
                const side1Length = Math.round(Math.sqrt(side1Dx * side1Dx + side1Dy * side1Dy));
                
                const side2Dx = side2EndX - side2StartX;
                const side2Dy = side2EndY - side2StartY;
                const side2Length = Math.round(Math.sqrt(side2Dx * side2Dx + side2Dy * side2Dy));
                
                const innerDx = innerEndX - innerStartX;
                const innerDy = innerEndY - innerStartY;
                const innerLength = Math.round(Math.sqrt(innerDx * innerDx + innerDy * innerDy));
                
                if (junctions.length === 0) {
                    // No T-junctions along the wall, but may have corner connections at endpoints
                    const offsetDist = 80 / this.zoom;
                    const fullLength = Math.round(length);
                    
                    // Determine which edges to use based on corner connections OR endpoint T-junctions
                    const hasCorners = startConnections.length > 0 || endConnections.length > 0 || startTJunction || endTJunction;
                    
                    if (hasCorners) {
                        // Check if this wall has endpoint T-junctions (different from L-junction)
                        const hasEndpointTJunction = startTJunction || endTJunction;
                        
                        // L-junctions (corner connections only): inner side shortened, outer side full and LONGER
                        // Endpoint T-junctions: both sides use same adjusted centerline (don't extend into crossing wall)
                        
                        // Side 1 (inner): shortened dimension
                        const side1MidX = (innerStartX + innerEndX) / 2;
                        const side1MidY = (innerStartY + innerEndY) / 2;
                        const side1DimX = side1MidX + perpX * offsetDist;
                        const side1DimY = side1MidY + perpY * offsetDist;
                        
                        // Calculate centerline points for dimension line extension
                        const innerCenterStartX = (startConnections.length > 0 || startTJunction) 
                            ? wall.start.x + Math.cos(angle) * this.WALL_THICKNESS 
                            : wall.start.x;
                        const innerCenterStartY = (startConnections.length > 0 || startTJunction) 
                            ? wall.start.y + Math.sin(angle) * this.WALL_THICKNESS 
                            : wall.start.y;
                        const innerCenterEndX = (endConnections.length > 0 || endTJunction) 
                            ? wall.end.x - Math.cos(angle) * this.WALL_THICKNESS 
                            : wall.end.x;
                        const innerCenterEndY = (endConnections.length > 0 || endTJunction) 
                            ? wall.end.y - Math.sin(angle) * this.WALL_THICKNESS 
                            : wall.end.y;
                        
                        this.drawDimensionText(side1DimX, side1DimY, innerLength, angle, 
                            {x: innerCenterStartX, y: innerCenterStartY}, {x: innerCenterEndX, y: innerCenterEndY}, perpX, perpY, halfThick, false, wall, wallIndex);
                        
                        // Side 2 (outer): behavior depends on whether endpoints form T-junctions
                        const side2MidX = hasEndpointTJunction 
                            ? (innerCenterStartX + innerCenterEndX) / 2  // T-junction: use adjusted centerline
                            : (wall.start.x + wall.end.x) / 2;            // L-junction: use original centerline (longer)
                        const side2MidY = hasEndpointTJunction 
                            ? (innerCenterStartY + innerCenterEndY) / 2
                            : (wall.start.y + wall.end.y) / 2;
                        const side2DimX = side2MidX - perpX * (offsetDist + halfThick);
                        const side2DimY = side2MidY - perpY * (offsetDist + halfThick);
                        
                        const side2StartPoint = hasEndpointTJunction 
                            ? {x: innerCenterStartX, y: innerCenterStartY}  // T-junction: adjusted
                            : wall.start;                                     // L-junction: original
                        const side2EndPoint = hasEndpointTJunction 
                            ? {x: innerCenterEndX, y: innerCenterEndY}
                            : wall.end;
                        
                        this.drawDimensionText(side2DimX, side2DimY, fullLength, angle, 
                            side2StartPoint, side2EndPoint, -perpX, -perpY, halfThick, false, wall, wallIndex);
                    } else {
                        // No corners - both sides get full dimension from wall centerline
                        // Extension lines will extend to wall edges automatically
                        
                        // Side 1 dimension (positive perpendicular)
                        const side1MidX = (wall.start.x + wall.end.x) / 2;
                        const side1MidY = (wall.start.y + wall.end.y) / 2;
                        const side1DimX = side1MidX + perpX * (offsetDist + halfThick);
                        const side1DimY = side1MidY + perpY * (offsetDist + halfThick);
                        
                        this.drawDimensionText(side1DimX, side1DimY, fullLength, angle, 
                            wall.start, wall.end, perpX, perpY, halfThick, false, wall, wallIndex);
                        
                        // Side 2 dimension (negative perpendicular)
                        const side2MidX = (wall.start.x + wall.end.x) / 2;
                        const side2MidY = (wall.start.y + wall.end.y) / 2;
                        const side2DimX = side2MidX - perpX * (offsetDist + halfThick);
                        const side2DimY = side2MidY - perpY * (offsetDist + halfThick);
                        
                        this.drawDimensionText(side2DimX, side2DimY, fullLength, angle, 
                            wall.start, wall.end, -perpX, -perpY, halfThick, false, wall, wallIndex);
                    }
                } else {
                    // Has T-junctions - determine which side has the junction
                    const points = [wall.start, ...junctions.map(j => j.point), wall.end];
                    points.sort((a, b) => {
                        const distA = (a.x - wall.start.x) * dx + (a.y - wall.start.y) * dy;
                        const distB = (b.x - wall.start.x) * dx + (b.y - wall.start.y) * dy;
                        return distA - distB;
                    });
                    
                    // Determine which side the T-junction is on by checking the connecting wall
                    // We'll check if the junction wall is on the positive or negative perpendicular side
                    let junctionOnInnerSide = true; // default assumption
                    
                    if (junctions.length > 0) {
                        // Check the first junction to determine which side it's on
                        const junctionWalls = this.walls.filter(w => {
                            if (w === wall) return false;
                            const distToStart = Math.sqrt(
                                (junctions[0].point.x - w.start.x) ** 2 + (junctions[0].point.y - w.start.y) ** 2
                            );
                            const distToEnd = Math.sqrt(
                                (junctions[0].point.x - w.end.x) ** 2 + (junctions[0].point.y - w.end.y) ** 2
                            );
                            return distToStart < 0.1 || distToEnd < 0.1;
                        });
                        
                        if (junctionWalls.length > 0) {
                            // Get the direction of the junction wall
                            const jWall = junctionWalls[0];
                            const jDx = jWall.end.x - jWall.start.x;
                            const jDy = jWall.end.y - jWall.start.y;
                            const jAngle = Math.atan2(jDy, jDx);
                            
                            // Check if junction wall points in perpendicular direction
                            const jPerpX = -Math.sin(jAngle);
                            const jPerpY = Math.cos(jAngle);
                            
                            // Dot product to see if it's on inner or outer side
                            const dotProduct = jPerpX * perpX + jPerpY * perpY;
                            junctionOnInnerSide = dotProduct > 0;
                        }
                    }
                    
                    // Full dimension on unobstructed side, segments on junction side
                    const offsetDist = 80 / this.zoom;
                    
                    if (junctionOnInnerSide) {
                        // T-junction on side1 - side2 gets full dimension
                        // Calculate adjusted centerline points that account for endpoint connections
                        const outerStartX = (startConnections.length > 0 || startTJunction) 
                            ? wall.start.x + Math.cos(angle) * this.WALL_THICKNESS 
                            : wall.start.x;
                        const outerStartY = (startConnections.length > 0 || startTJunction) 
                            ? wall.start.y + Math.sin(angle) * this.WALL_THICKNESS 
                            : wall.start.y;
                        const outerEndX = (endConnections.length > 0 || endTJunction) 
                            ? wall.end.x - Math.cos(angle) * this.WALL_THICKNESS 
                            : wall.end.x;
                        const outerEndY = (endConnections.length > 0 || endTJunction) 
                            ? wall.end.y - Math.sin(angle) * this.WALL_THICKNESS 
                            : wall.end.y;
                        
                        const fullLength = Math.round(length);
                        const side2MidX = (outerStartX + outerEndX) / 2;
                        const side2MidY = (outerStartY + outerEndY) / 2;
                        const side2DimX = side2MidX - perpX * (offsetDist + halfThick);
                        const side2DimY = side2MidY - perpY * (offsetDist + halfThick);
                        
                        this.drawDimensionText(side2DimX, side2DimY, fullLength, angle, 
                            {x: outerStartX, y: outerStartY}, {x: outerEndX, y: outerEndY}, -perpX, -perpY, halfThick, false, wall, wallIndex);
                        
                        // Side1 gets segmented dimensions (accounting for intersecting wall thickness)
                        for (let i = 0; i < points.length - 1; i++) {
                            const p1Original = points[i];
                            const p2Original = points[i + 1];
                            
                            // Create edge points for dimension (offset perpendicular to wall)
                            let p1Edge = {x: p1Original.x + perpX * halfThick, y: p1Original.y + perpY * halfThick};
                            let p2Edge = {x: p2Original.x + perpX * halfThick, y: p2Original.y + perpY * halfThick};
                            
                            // Check if p1 or p2 is a junction point (not a wall endpoint)
                            const isP1Junction = junctions.find(j => 
                                Math.abs(j.point.x - p1Original.x) < 0.1 && Math.abs(j.point.y - p1Original.y) < 0.1
                            );
                            const isP2Junction = junctions.find(j => 
                                Math.abs(j.point.x - p2Original.x) < 0.1 && Math.abs(j.point.y - p2Original.y) < 0.1
                            );
                            
                            // Adjust edge points to account for intersecting wall thickness
                            // Adjust junction points, AND also adjust wall endpoints if they have connections
                            if (isP1Junction && i > 0) {
                                // p1 is a junction - segment starts AFTER junction, move forward past intersecting wall
                                p1Edge = {
                                    x: p1Original.x + Math.cos(angle) * halfThick + perpX * halfThick,
                                    y: p1Original.y + Math.sin(angle) * halfThick + perpY * halfThick
                                };
                            } else if (i === 0 && (startConnections.length > 0 || startTJunction)) {
                                // First point is wall start with corner/T-junction - move forward by wall thickness
                                p1Edge = {
                                    x: wall.start.x + Math.cos(angle) * this.WALL_THICKNESS + perpX * halfThick,
                                    y: wall.start.y + Math.sin(angle) * this.WALL_THICKNESS + perpY * halfThick
                                };
                            }
                            if (isP2Junction && i < points.length - 2) {
                                // p2 is a junction - segment ends BEFORE junction, move backward before intersecting wall
                                p2Edge = {
                                    x: p2Original.x - Math.cos(angle) * halfThick + perpX * halfThick,
                                    y: p2Original.y - Math.sin(angle) * halfThick + perpY * halfThick
                                };
                            } else if (i === points.length - 2 && (endConnections.length > 0 || endTJunction)) {
                                // Last point is wall end with corner/T-junction - move backward by wall thickness
                                p2Edge = {
                                    x: wall.end.x - Math.cos(angle) * this.WALL_THICKNESS + perpX * halfThick,
                                    y: wall.end.y - Math.sin(angle) * this.WALL_THICKNESS + perpY * halfThick
                                };
                            }
                            
                            const segDx = p2Edge.x - p1Edge.x;
                            const segDy = p2Edge.y - p1Edge.y;
                            const segLength = Math.round(Math.sqrt(segDx * segDx + segDy * segDy));
                            const segMidX = (p1Edge.x + p2Edge.x) / 2;
                            const segMidY = (p1Edge.y + p2Edge.y) / 2;
                            
                            // Use adjusted edge points - only junctions are shortened
                            this.drawDimensionText(segMidX + perpX * offsetDist, segMidY + perpY * offsetDist, 
                                segLength, angle, p1Edge, p2Edge, perpX, perpY, halfThick, true, wall, wallIndex);
                        }
                    } else {
                        // T-junction on side2 - side1 gets full dimension
                        // Calculate adjusted centerline points that account for endpoint connections
                        const innerStartX = (startConnections.length > 0 || startTJunction) 
                            ? wall.start.x + Math.cos(angle) * this.WALL_THICKNESS 
                            : wall.start.x;
                        const innerStartY = (startConnections.length > 0 || startTJunction) 
                            ? wall.start.y + Math.sin(angle) * this.WALL_THICKNESS 
                            : wall.start.y;
                        const innerEndX = (endConnections.length > 0 || endTJunction) 
                            ? wall.end.x - Math.cos(angle) * this.WALL_THICKNESS 
                            : wall.end.x;
                        const innerEndY = (endConnections.length > 0 || endTJunction) 
                            ? wall.end.y - Math.sin(angle) * this.WALL_THICKNESS 
                            : wall.end.y;
                        
                        const fullLength = Math.round(length);
                        const side1MidX = (innerStartX + innerEndX) / 2;
                        const side1MidY = (innerStartY + innerEndY) / 2;
                        const side1DimX = side1MidX + perpX * (offsetDist + halfThick);
                        const side1DimY = side1MidY + perpY * (offsetDist + halfThick);
                        
                        this.drawDimensionText(side1DimX, side1DimY, fullLength, angle, 
                            {x: innerStartX, y: innerStartY}, {x: innerEndX, y: innerEndY}, perpX, perpY, halfThick, false, wall, wallIndex);
                        
                        // Side2 gets segmented dimensions (accounting for intersecting wall thickness)
                        for (let i = 0; i < points.length - 1; i++) {
                            const p1Original = points[i];
                            const p2Original = points[i + 1];
                            
                            // Create edge points for dimension (offset perpendicular to wall)
                            let p1Edge = {x: p1Original.x - perpX * halfThick, y: p1Original.y - perpY * halfThick};
                            let p2Edge = {x: p2Original.x - perpX * halfThick, y: p2Original.y - perpY * halfThick};
                            
                            // Check if p1 or p2 is a junction point (not a wall endpoint)
                            const isP1Junction = junctions.find(j => 
                                Math.abs(j.point.x - p1Original.x) < 0.1 && Math.abs(j.point.y - p1Original.y) < 0.1
                            );
                            const isP2Junction = junctions.find(j => 
                                Math.abs(j.point.x - p2Original.x) < 0.1 && Math.abs(j.point.y - p2Original.y) < 0.1
                            );
                            
                            // Adjust edge points to account for intersecting wall thickness
                            // Adjust junction points, AND also adjust wall endpoints if they have connections
                            if (isP1Junction && i > 0) {
                                // p1 is a junction - segment starts AFTER junction, move forward past intersecting wall
                                p1Edge = {
                                    x: p1Original.x + Math.cos(angle) * halfThick - perpX * halfThick,
                                    y: p1Original.y + Math.sin(angle) * halfThick - perpY * halfThick
                                };
                            } else if (i === 0 && (startConnections.length > 0 || startTJunction)) {
                                // First point is wall start with corner/T-junction - move forward by wall thickness
                                p1Edge = {
                                    x: wall.start.x + Math.cos(angle) * this.WALL_THICKNESS - perpX * halfThick,
                                    y: wall.start.y + Math.sin(angle) * this.WALL_THICKNESS - perpY * halfThick
                                };
                            }
                            if (isP2Junction && i < points.length - 2) {
                                // p2 is a junction - segment ends BEFORE junction, move backward before intersecting wall
                                p2Edge = {
                                    x: p2Original.x - Math.cos(angle) * halfThick - perpX * halfThick,
                                    y: p2Original.y - Math.sin(angle) * halfThick - perpY * halfThick
                                };
                            } else if (i === points.length - 2 && (endConnections.length > 0 || endTJunction)) {
                                // Last point is wall end with corner/T-junction - move backward by wall thickness
                                p2Edge = {
                                    x: wall.end.x - Math.cos(angle) * this.WALL_THICKNESS - perpX * halfThick,
                                    y: wall.end.y - Math.sin(angle) * this.WALL_THICKNESS - perpY * halfThick
                                };
                            }
                            
                            const segDx = p2Edge.x - p1Edge.x;
                            const segDy = p2Edge.y - p1Edge.y;
                            const segLength = Math.round(Math.sqrt(segDx * segDx + segDy * segDy));
                            const segMidX = (p1Edge.x + p2Edge.x) / 2;
                            const segMidY = (p1Edge.y + p2Edge.y) / 2;
                            
                            // Use adjusted edge points - only junctions are shortened
                            this.drawDimensionText(segMidX - perpX * offsetDist, segMidY - perpY * offsetDist, 
                                segLength, angle, p1Edge, p2Edge, -perpX, -perpY, halfThick, true, wall, wallIndex);
                        }
                    }
                }
            }

            getConnectedWallsAtEndpoint(point, currentWall = null) {
                // Find walls connected at this exact endpoint
                const connected = [];
                const tolerance = 0.1;
                
                for (const wall of this.walls) {
                    if (wall === currentWall) continue;
                    
                    const distToStart = Math.sqrt(
                        (point.x - wall.start.x) ** 2 + (point.y - wall.start.y) ** 2
                    );
                    const distToEnd = Math.sqrt(
                        (point.x - wall.end.x) ** 2 + (point.y - wall.end.y) ** 2
                    );
                    
                    if (distToStart < tolerance || distToEnd < tolerance) {
                        connected.push(wall);
                    }
                }
                
                return connected;
            }

            hasNearbyWallConnection(point, currentWall = null, radius = 10) {
                // Check if there's a wall connection within a radius of this point
                // This is used for T-junction segments to detect junction boundaries
                const tolerance = radius;
                
                // Check if any wall endpoint or centerline passes near this point
                for (const wall of this.walls) {
                    if (currentWall && wall === currentWall) continue;
                    
                    // Check endpoints
                    const distToStart = Math.sqrt(
                        (point.x - wall.start.x) ** 2 + (point.y - wall.start.y) ** 2
                    );
                    const distToEnd = Math.sqrt(
                        (point.x - wall.end.x) ** 2 + (point.y - wall.end.y) ** 2
                    );
                    
                    if (distToStart < tolerance || distToEnd < tolerance) {
                        return true;
                    }
                    
                    // Check if point is near the wall's centerline
                    const dx = wall.end.x - wall.start.x;
                    const dy = wall.end.y - wall.start.y;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    
                    if (length > 0) {
                        const t = ((point.x - wall.start.x) * dx + (point.y - wall.start.y) * dy) / (length * length);
                        
                        if (t >= -0.1 && t <= 1.1) {
                            const projX = wall.start.x + t * dx;
                            const projY = wall.start.y + t * dy;
                            const distToLine = Math.sqrt(
                                (point.x - projX) ** 2 + (point.y - projY) ** 2
                            );
                            
                            if (distToLine < tolerance) {
                                return true;
                            }
                        }
                    }
                }
                
                return false;
            }

            hasWallConnection(point, currentWall = null) {
                // Check if a point has any wall connection (corner or T-junction)
                // excluding the current wall itself
                const tolerance = 0.1;
                
                // First check: is this point an endpoint of another wall?
                // (L-junctions, + junctions)
                for (const wall of this.walls) {
                    if (currentWall && wall === currentWall) continue;
                    
                    const distToStart = Math.sqrt(
                        (point.x - wall.start.x) ** 2 + (point.y - wall.start.y) ** 2
                    );
                    const distToEnd = Math.sqrt(
                        (point.x - wall.end.x) ** 2 + (point.y - wall.end.y) ** 2
                    );
                    
                    if (distToStart < tolerance || distToEnd < tolerance) {
                        return true;
                    }
                }
                
                // Second check: is this point on another wall's centerline?
                // (T-junctions)
                for (const wall of this.walls) {
                    if (currentWall && wall === currentWall) continue;
                    
                    const dx = wall.end.x - wall.start.x;
                    const dy = wall.end.y - wall.start.y;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    
                    if (length > 0) {
                        const t = ((point.x - wall.start.x) * dx + (point.y - wall.start.y) * dy) / (length * length);
                        
                        if (t > 0.01 && t < 0.99) {
                            const projX = wall.start.x + t * dx;
                            const projY = wall.start.y + t * dy;
                            const distToLine = Math.sqrt(
                                (point.x - projX) ** 2 + (point.y - projY) ** 2
                            );
                            
                            if (distToLine < tolerance) {
                                return true;
                            }
                        }
                    }
                }
                
                return false;
            }

            checkPointOnWall(point, currentWall) {
                // Check if a point lies on any other wall's centerline (forming a T-junction)
                const tolerance = 0.1;
                
                for (const wall of this.walls) {
                    if (wall === currentWall) continue;
                    
                    const dx = wall.end.x - wall.start.x;
                    const dy = wall.end.y - wall.start.y;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    
                    if (length > 0) {
                        const t = ((point.x - wall.start.x) * dx + (point.y - wall.start.y) * dy) / (length * length);
                        
                        if (t > 0.01 && t < 0.99) {
                            const projX = wall.start.x + t * dx;
                            const projY = wall.start.y + t * dy;
                            const distToLine = Math.sqrt(
                                (point.x - projX) ** 2 + (point.y - projY) ** 2
                            );
                            
                            if (distToLine < tolerance) {
                                return true;
                            }
                        }
                    }
                }
                
                return false;
            }

            findTJunctions(wall) {
                // Find all points where other walls connect to this wall (not at endpoints)
                const junctions = [];
                const tolerance = 0.1;
                
                for (const otherWall of this.walls) {
                    if (otherWall === wall) continue;
                    
                    // Check if other wall's start or end connects along this wall's length
                    [otherWall.start, otherWall.end].forEach(point => {
                        // Skip if point is at wall endpoints
                        const distToStart = Math.sqrt(
                            (point.x - wall.start.x) ** 2 + (point.y - wall.start.y) ** 2
                        );
                        const distToEnd = Math.sqrt(
                            (point.x - wall.end.x) ** 2 + (point.y - wall.end.y) ** 2
                        );
                        
                        if (distToStart < tolerance || distToEnd < tolerance) return;
                        
                        // Check if point lies on the wall segment
                        const dx = wall.end.x - wall.start.x;
                        const dy = wall.end.y - wall.start.y;
                        const length = Math.sqrt(dx * dx + dy * dy);
                        
                        if (length > 0) {
                            const t = ((point.x - wall.start.x) * dx + (point.y - wall.start.y) * dy) / (length * length);
                            
                            if (t > 0.01 && t < 0.99) {
                                const projX = wall.start.x + t * dx;
                                const projY = wall.start.y + t * dy;
                                const distToLine = Math.sqrt(
                                    (point.x - projX) ** 2 + (point.y - projY) ** 2
                                );
                                
                                if (distToLine < tolerance) {
                                    junctions.push({ 
                                        point: { x: projX, y: projY }, 
                                        t,
                                        wall: otherWall  // Store reference to intersecting wall
                                    });
                                }
                            }
                        }
                    });
                }
                
                return junctions;
            }

            isNearWallCenterline(point, currentWall, maxDistance) {
                // Check if a point is near (within maxDistance) any other wall's centerline
                // This is used to detect T-junctions where the point has been offset slightly
                // Returns true if point is close to another wall's centerline (not at endpoints)
                
                for (const wall of this.walls) {
                    if (wall === currentWall) continue;
                    
                    const dx = wall.end.x - wall.start.x;
                    const dy = wall.end.y - wall.start.y;
                    const length = Math.sqrt(dx * dx + dy * dy);
                    
                    if (length > 0) {
                        const t = ((point.x - wall.start.x) * dx + (point.y - wall.start.y) * dy) / (length * length);
                        
                        // Check along wall centerline, extending slightly beyond rendered endpoints
                        // This catches T-junctions where walls have been shortened due to corner connections
                        if (t > -0.2 && t < 1.2) {
                            const projX = wall.start.x + t * dx;
                            const projY = wall.start.y + t * dy;
                            const distToLine = Math.sqrt(
                                (point.x - projX) ** 2 + (point.y - projY) ** 2
                            );
                            
                            if (distToLine < maxDistance) {
                                return true;
                            }
                        }
                    }
                }
                
                return false;
            }

            drawDimensionText(x, y, value, angle, wallStart, wallEnd, dimPerpX, dimPerpY, wallHalfThick, pointsAreAdjusted, currentWall = null, wallIndex = -1) {
                // wallStart/wallEnd are either centerline points OR already-adjusted edge points (for T-junctions)
                // dimPerpX/dimPerpY indicate which side to draw the dimension (positive or negative perpendicular)
                // pointsAreAdjusted: if true, wallStart/wallEnd are already adjusted for corners/T-junctions
                // Extension lines go from wall edge to dimension line
                // currentWall: the wall being dimensioned (needed to exclude it from connection checks)
                // wallIndex: the index of the wall in the walls array (for debug output)
                
                const offsetDist = 80 / this.zoom;
                const extensionBeyond = 20 / this.zoom;
                
                // Calculate wall direction (normalized)
                const dx = wallEnd.x - wallStart.x;
                const dy = wallEnd.y - wallStart.y;
                const wallLength = Math.sqrt(dx * dx + dy * dy);
                const wallDirX = dx / wallLength;
                const wallDirY = dy / wallLength;
                
                // Check if there are walls BLOCKING extension at the start/end points
                // We need to distinguish between:
                // - T-junction segments: segment boundaries ARE T-junctions, don't extend
                // - L-junction/corner: walls meet at corner only (extend fully)
                // - Single walls: no blocking (extend fully)
                let hasBlockingWallAtStart, hasBlockingWallAtEnd;
                
                if (pointsAreAdjusted) {
                    // For adjusted points, distinguish between T-junction and L-junction:
                    // - T-junction segments: edge points have BOTH perpendicular and parallel offsets
                    //   (moved away from junction by halfThick along wall, plus perp offset)
                    // - L-junction edges: edge points only have parallel offset (moved into wall by WALL_THICKNESS)
                    //   plus perpendicular offset
                    // 
                    // To detect T-junction: remove perpendicular offset, then check if we're NEAR
                    // another wall's centerline (within halfThick, accounting for parallel offset)
                    const centerlineStart = {
                        x: wallStart.x - dimPerpX * wallHalfThick,
                        y: wallStart.y - dimPerpY * wallHalfThick
                    };
                    const centerlineEnd = {
                        x: wallEnd.x - dimPerpX * wallHalfThick,
                        y: wallEnd.y - dimPerpY * wallHalfThick
                    };
                    
                    // Check if this centerline point is near another wall's centerline
                    // For T-junction segments, the point will be within halfThick of the crossing wall
                    // For L-junctions, the point will be at the corner, not near any centerline
                    hasBlockingWallAtStart = this.isNearWallCenterline(centerlineStart, currentWall, wallHalfThick + 0.5);
                    hasBlockingWallAtEnd = this.isNearWallCenterline(centerlineEnd, currentWall, wallHalfThick + 0.5);
                    
                    if (this.debugDimensions && wallIndex >= 0) {
                        console.log(`  Centerline check: Start=(${Math.round(centerlineStart.x)}, ${Math.round(centerlineStart.y)}) End=(${Math.round(centerlineEnd.x)}, ${Math.round(centerlineEnd.y)})`);
                    }
                } else {
                    // For non-adjusted points (wall centerline), check if point is on another wall
                    hasBlockingWallAtStart = this.checkPointOnWall(wallStart, currentWall);
                    hasBlockingWallAtEnd = this.checkPointOnWall(wallEnd, currentWall);
                }
                
                // Calculate dimension line positions
                let lineStartX, lineStartY, lineEndX, lineEndY;
                let extLineStartX, extLineStartY, extLineEndX, extLineEndY;
                let extEndStartX, extEndStartY, extEndEndX, extEndEndY;
                
                if (pointsAreAdjusted) {
                    // Points are already at ONE edge of the wall (dimension side)
                    // Dimension line endpoints should be at the visual edge perpendicular to wall
                    // Extend along wall direction to reach visual corners, but stop at blocking walls (T-junctions)
                    const startWallExtension = hasBlockingWallAtStart ? 0 : wallHalfThick;
                    const endWallExtension = hasBlockingWallAtEnd ? 0 : wallHalfThick;
                    
                    // Calculate dimension line endpoints
                    // Always extend perpendicular to reach the dimension offset
                    // Extend along wall direction only when no connection
                    lineStartX = wallStart.x + dimPerpX * offsetDist - wallDirX * startWallExtension;
                    lineStartY = wallStart.y + dimPerpY * offsetDist - wallDirY * startWallExtension;
                    lineEndX = wallEnd.x + dimPerpX * offsetDist + wallDirX * endWallExtension;
                    lineEndY = wallEnd.y + dimPerpY * offsetDist + wallDirY * endWallExtension;
                    
                    // Extension lines start from opposite edge
                    extLineStartX = wallStart.x - dimPerpX * 2 * wallHalfThick - wallDirX * startWallExtension;
                    extLineStartY = wallStart.y - dimPerpY * 2 * wallHalfThick - wallDirY * startWallExtension;
                    extLineEndX = wallEnd.x - dimPerpX * 2 * wallHalfThick + wallDirX * endWallExtension;
                    extLineEndY = wallEnd.y - dimPerpY * 2 * wallHalfThick + wallDirY * endWallExtension;
                    
                    extEndStartX = wallStart.x + dimPerpX * (offsetDist + extensionBeyond) - wallDirX * startWallExtension;
                    extEndStartY = wallStart.y + dimPerpY * (offsetDist + extensionBeyond) - wallDirY * startWallExtension;
                    extEndEndX = wallEnd.x + dimPerpX * (offsetDist + extensionBeyond) + wallDirX * endWallExtension;
                    extEndEndY = wallEnd.y + dimPerpY * (offsetDist + extensionBeyond) + wallDirY * endWallExtension;
                } else {
                    // wallStart/wallEnd are centerline points
                    // We need to extend:
                    // 1. Perpendicular: always by wallHalfThick to reach the dimension side edge
                    // 2. Parallel (along wall): extend to visual corner unless blocked by T-junction
                    const startWallExtension = hasBlockingWallAtStart ? 0 : wallHalfThick;
                    const endWallExtension = hasBlockingWallAtEnd ? 0 : wallHalfThick;
                    
                    // Dimension line position (always at offsetDist from dimension-side edge)
                    lineStartX = wallStart.x + dimPerpX * (wallHalfThick + offsetDist) - wallDirX * startWallExtension;
                    lineStartY = wallStart.y + dimPerpY * (wallHalfThick + offsetDist) - wallDirY * startWallExtension;
                    lineEndX = wallEnd.x + dimPerpX * (wallHalfThick + offsetDist) + wallDirX * endWallExtension;
                    lineEndY = wallEnd.y + dimPerpY * (wallHalfThick + offsetDist) + wallDirY * endWallExtension;
                    
                    // Extension lines: from opposite wall edge to dimension line
                    // Opposite edge is at -dimPerpX/Y * wallHalfThick from centerline
                    extLineStartX = wallStart.x - dimPerpX * wallHalfThick - wallDirX * startWallExtension;
                    extLineStartY = wallStart.y - dimPerpY * wallHalfThick - wallDirY * startWallExtension;
                    extLineEndX = wallEnd.x - dimPerpX * wallHalfThick + wallDirX * endWallExtension;
                    extLineEndY = wallEnd.y - dimPerpY * wallHalfThick + wallDirY * endWallExtension;
                    
                    // Extension line end points (beyond dimension line)
                    extEndStartX = wallStart.x + dimPerpX * (wallHalfThick + offsetDist + extensionBeyond) - wallDirX * startWallExtension;
                    extEndStartY = wallStart.y + dimPerpY * (wallHalfThick + offsetDist + extensionBeyond) - wallDirY * startWallExtension;
                    extEndEndX = wallEnd.x + dimPerpX * (wallHalfThick + offsetDist + extensionBeyond) + wallDirX * endWallExtension;
                    extEndEndY = wallEnd.y + dimPerpY * (wallHalfThick + offsetDist + extensionBeyond) + wallDirY * endWallExtension;
                }
                
                
                // Start extension line - from opposite wall edge through centerline to beyond dimension line
                const extStart = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                extStart.setAttribute('x1', extLineStartX);
                extStart.setAttribute('y1', extLineStartY);
                extStart.setAttribute('x2', extEndStartX);
                extStart.setAttribute('y2', extEndStartY);
                extStart.setAttribute('stroke', '#999');
                extStart.setAttribute('stroke-width', 1.5 / this.zoom);
                this.canvas.appendChild(extStart);
                
                // End extension line - from opposite wall edge through centerline to beyond dimension line
                const extEnd = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                extEnd.setAttribute('x1', extLineEndX);
                extEnd.setAttribute('y1', extLineEndY);
                extEnd.setAttribute('x2', extEndEndX);
                extEnd.setAttribute('y2', extEndEndY);
                extEnd.setAttribute('stroke', '#999');
                extEnd.setAttribute('stroke-width', 1.5 / this.zoom);
                this.canvas.appendChild(extEnd);
                
                // Draw dimension line
                const dimLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                dimLine.setAttribute('x1', lineStartX);
                dimLine.setAttribute('y1', lineStartY);
                dimLine.setAttribute('x2', lineEndX);
                dimLine.setAttribute('y2', lineEndY);
                dimLine.setAttribute('stroke', '#000000');
                dimLine.setAttribute('stroke-width', 1 / this.zoom);
                this.canvas.appendChild(dimLine);
                
                // Draw start tick
                const tickSize = 10 / this.zoom;
                const tickStart1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                tickStart1.setAttribute('x1', lineStartX - Math.cos(angle) * tickSize);
                tickStart1.setAttribute('y1', lineStartY - Math.sin(angle) * tickSize);
                tickStart1.setAttribute('x2', lineStartX + Math.cos(angle) * tickSize);
                tickStart1.setAttribute('y2', lineStartY + Math.sin(angle) * tickSize);
                tickStart1.setAttribute('stroke', '#333');
                tickStart1.setAttribute('stroke-width', 2 / this.zoom);
                this.canvas.appendChild(tickStart1);
                
                // Draw end tick
                const tickEnd1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                tickEnd1.setAttribute('x1', lineEndX - Math.cos(angle) * tickSize);
                tickEnd1.setAttribute('y1', lineEndY - Math.sin(angle) * tickSize);
                tickEnd1.setAttribute('x2', lineEndX + Math.cos(angle) * tickSize);
                tickEnd1.setAttribute('y2', lineEndY + Math.sin(angle) * tickSize);
                tickEnd1.setAttribute('stroke', '#333');
                tickEnd1.setAttribute('stroke-width', 2 / this.zoom);
                this.canvas.appendChild(tickEnd1);
                
                // Add background for text
                const fontSize = 50 / this.zoom;
                const textWidth = value.toString().length * fontSize * 0.6;
                const bbox = { x: x - textWidth / 2, y: y - fontSize / 2, width: textWidth, height: fontSize };
                const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                bg.setAttribute('x', bbox.x);
                bg.setAttribute('y', bbox.y);
                bg.setAttribute('width', bbox.width);
                bg.setAttribute('height', bbox.height);
                bg.setAttribute('fill', 'white');
                bg.setAttribute('opacity', '0.9');
                bg.setAttribute('rx', 2 / this.zoom);
                this.canvas.appendChild(bg);
                
                // Draw text perpendicular to wall
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', x);
                text.setAttribute('y', y);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                text.setAttribute('font-size', fontSize);
                text.setAttribute('font-weight', 'bold');
                text.setAttribute('fill', '#333');
                
                // Rotate text to be parallel to wall (perpendicular to dimension line)
                const angleDeg = angle * 180 / Math.PI;
                let textAngle = angleDeg;
                // Keep text readable (not upside down)
                if (textAngle > 90) textAngle -= 180;
                if (textAngle < -90) textAngle += 180;
                text.setAttribute('transform', `rotate(${textAngle}, ${x}, ${y})`);
                
                text.textContent = value;
                this.canvas.appendChild(text);
                
                    // Debug visualization - show all key coordinates
                if (this.debugDimensions) {
                    // Log to console with inline coordinates
                    const wallLabel = wallIndex >= 0 ? `Wall #${wallIndex}` : 'Wall';
                    console.group(`📐 ${wallLabel} Dimension (value: ${value}cm)`);

                    console.log(`Dimension Line: start=(${Math.round(lineStartX)}, ${Math.round(lineStartY)}) end=(${Math.round(lineEndX)}, ${Math.round(lineEndY)})`);
                    console.log(`Extension (from wall): start=(${Math.round(extLineStartX)}, ${Math.round(extLineStartY)}) end=(${Math.round(extLineEndX)}, ${Math.round(extLineEndY)})`);
                    console.log(`Extension (beyond): start=(${Math.round(extEndStartX)}, ${Math.round(extEndStartY)}) end=(${Math.round(extEndEndX)}, ${Math.round(extEndEndY)})`);

                    console.log(`Blocking: Start=${hasBlockingWallAtStart} End=${hasBlockingWallAtEnd} | Adjusted=${pointsAreAdjusted}`);
                    console.log(`Direction: wall=(${wallDirX.toFixed(3)}, ${wallDirY.toFixed(3)}) perp=(${dimPerpX.toFixed(3)}, ${dimPerpY.toFixed(3)})`);
                    console.groupEnd();
                    
                    const debugFontSize = 30 / this.zoom;
                    
                    // Helper function to draw a debug label

            drawWall(wall, isPreview = false, isSelected = false) {
                const dx = wall.end.x - wall.start.x;
                const dy = wall.end.y - wall.start.y;
                const length = Math.sqrt(dx * dx + dy * dy);
                
                // Use SVG path with stroke for clean joins
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', `M ${wall.start.x} ${wall.start.y} L ${wall.end.x} ${wall.end.y}`);
                path.setAttribute('stroke', 'url(#wallPattern)');
                path.setAttribute('stroke-width', this.WALL_THICKNESS);
                path.setAttribute('stroke-linecap', 'square');
                path.setAttribute('stroke-linejoin', 'miter');
                path.setAttribute('fill', 'none');
                path.setAttribute('opacity', isPreview ? '0.7' : '1');
                this.canvas.appendChild(path);
                
                // Add outline
                const outline = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                outline.setAttribute('d', `M ${wall.start.x} ${wall.start.y} L ${wall.end.x} ${wall.end.y}`);
                outline.setAttribute('stroke', isSelected ? '#ff8c00' : '#333');
                outline.setAttribute('stroke-width', this.WALL_THICKNESS + (isSelected ? 8 : 6) / this.zoom);
                outline.setAttribute('stroke-linecap', 'square');
                outline.setAttribute('stroke-linejoin', 'miter');
                outline.setAttribute('fill', 'none');
                outline.setAttribute('opacity', isPreview ? '0.7' : '1');
                this.canvas.insertBefore(outline, path);
                
                // Draw dimension
                const midX = (wall.start.x + wall.end.x) / 2;
                const midY = (wall.start.y + wall.end.y) / 2;
                const lengthCm = Math.round(length);
                
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', midX);
                text.setAttribute('y', midY);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                text.setAttribute('font-size', 16 / this.zoom);
                text.setAttribute('font-weight', 'bold');
                text.setAttribute('fill', '#333');
                text.textContent = lengthCm;
                
                // Add background for better readability
                const bbox = { x: midX - 25 / this.zoom, y: midY - 12 / this.zoom, width: 50 / this.zoom, height: 24 / this.zoom };
                const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                bg.setAttribute('x', bbox.x);
                bg.setAttribute('y', bbox.y);
                bg.setAttribute('width', bbox.width);
                bg.setAttribute('height', bbox.height);
                bg.setAttribute('fill', 'white');
                bg.setAttribute('opacity', '0.8');
                bg.setAttribute('rx', 2 / this.zoom);
                
                this.canvas.appendChild(bg);
                this.canvas.appendChild(text);
            }
            
            // Move Rate Calculator Functions
            showMoveRateModal() {
                const modal = document.getElementById('move-rate-modal');
                const globalRateInput = document.getElementById('global-move-rate');
                globalRateInput.value = this.moveRate;
                
                // Setup event listeners
                document.getElementById('close-move-rate-modal').onclick = () => this.closeMoveRateModal();
                document.getElementById('add-entry-btn').onclick = () => this.addMoveRateEntry();
                globalRateInput.oninput = () => {
                    this.moveRate = parseFloat(globalRateInput.value) || 2.5;
                    this.updateAllEntryCalculations();
                };
                
                // Render existing entries
                this.renderMoveRateEntries();
                
                modal.style.display = 'flex';
            }
            
            closeMoveRateModal() {
                document.getElementById('move-rate-modal').style.display = 'none';
                this.updateFurniturePanel();
            }
            
            addMoveRateEntry() {
                // Get all furniture links and add them all by default
                const allLinks = [];
                this.assets.forEach(furniture => {
                    if (furniture.name && furniture.links && furniture.links.length > 0) {
                        furniture.links.forEach((link, linkIndex) => {
                            if (link.targetName) {
                                allLinks.push({
                                    furnitureId: furniture.id,
                                    linkIndex: linkIndex
                                });
                            }
                        });
                    }
                });
                
                const entry = {
                    id: Date.now().toString(),
                    name: '',
                    quantity: 1,
                    furnitureLinks: allLinks // All checked by default
                };
                this.moveRateEntries.push(entry);
                this.renderMoveRateEntries();
            }

            createFurnitureSelectionList(entry) {
                const listDiv = document.createElement('div');
                listDiv.className = 'entry-furniture-list';
                
                // Get all furniture links (each link is a separate checkbox)
                const furnitureLinks = [];
                this.assets.forEach(furniture => {
                    if (furniture.name && furniture.links && furniture.links.length > 0) {
                        furniture.links.forEach((link, linkIndex) => {
                            if (link.targetName) {
                                furnitureLinks.push({
                                    furniture: furniture,
                                    link: link,
                                    linkIndex: linkIndex
                                });
                            }
                        });
                    }
                });
                
                if (furnitureLinks.length === 0) {
                    listDiv.innerHTML = '<div style="padding: 10px; text-align: center; color: #999;">No linked furniture found. Add links to furniture.</div>';
                    return listDiv;
                }
                
                furnitureLinks.forEach(item => {
                    const checkboxDiv = document.createElement('div');
                    checkboxDiv.className = 'furniture-checkbox';
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = `checkbox-${entry.id}-${item.furniture.id}-${item.linkIndex}`;
                    
                    // Check if this link is in the entry
                    checkbox.checked = entry.furnitureLinks ? entry.furnitureLinks.some(fl => 
                        fl.furnitureId === item.furniture.id && 
                        fl.linkIndex === item.linkIndex
                    ) : true; // Default checked
                    
                    checkbox.onchange = (e) => {
                        if (!entry.furnitureLinks) entry.furnitureLinks = [];
                        
                        const linkId = {
                            furnitureId: item.furniture.id,
                            linkIndex: item.linkIndex
                        };
                        
                        if (e.target.checked) {
                            entry.furnitureLinks.push(linkId);
                        } else {
                            entry.furnitureLinks = entry.furnitureLinks.filter(fl => 
                                !(fl.furnitureId === linkId.furnitureId && 
                                  fl.linkIndex === linkId.linkIndex)
                            );
                        }
                        this.updateEntryCalculation(entry.id);
                    };
                    
                    const label = document.createElement('label');
                    label.htmlFor = checkbox.id;
                    
                    // Calculate distance and get multiplier
                    const linkedAsset = this.assets.find(a => a.name === item.link.targetName);
                    let distanceText = '';
                    if (linkedAsset && this.pathNodes.length > 0) {
                        const path = this.findShortestPathBetweenFurniture(item.furniture, linkedAsset);
                        if (path) {
                            const distance = this.calculatePathDistance(path);
                            const multiplier = item.link.multiplier || 2;
                            distanceText = ` (${Math.round(distance)}cm, ×${multiplier})`;
                        }
                    }
                    
                    label.textContent = `${item.furniture.name} → ${item.link.targetName}${distanceText}`;
                    
                    checkboxDiv.appendChild(checkbox);
                    checkboxDiv.appendChild(label);
                    listDiv.appendChild(checkboxDiv);
                });
                
                return listDiv;
            }
            
            isSameFurniture(furnitureId, furniture) {
                return furnitureId.x === furniture.x && furnitureId.y === furniture.y && furnitureId.name === furniture.name;
            }
            
            calculatePathDistance(path) {
                if (!path || path.length < 2) return 0;
                let totalDistance = 0;
                for (let i = 0; i < path.length - 1; i++) {
                    const dx = path[i+1].x - path[i].x;
                    const dy = path[i+1].y - path[i].y;
                    totalDistance += Math.sqrt(dx * dx + dy * dy);
                }
                return totalDistance;
            }
            
            calculateEntryDistance(entry) {
                let totalDistanceCm = 0;
                
                if (!entry.furnitureLinks) return { m: '0.00 m', km: '0.000 km', time: '0m' };
                
                entry.furnitureLinks.forEach(linkRef => {
                    const furniture = this.assets.find(a => a.id === linkRef.furnitureId);
                    
                    if (!furniture || !furniture.links || !furniture.links[linkRef.linkIndex]) return;
                    
                    const link = furniture.links[linkRef.linkIndex];
                    if (!link.targetName) return;
                    
                    const linkedAsset = this.assets.find(a => a.name === link.targetName);
                    if (!linkedAsset || this.pathNodes.length === 0) return;
                    
                    const path = this.findShortestPathBetweenFurniture(furniture, linkedAsset);
                    if (!path) return;
                    
                    const distance = this.calculatePathDistance(path);
                    const tripMultiplier = link.multiplier || 2;
                    const roundTrip = 2; // Both ways
                    
                    // Formula: distance × 2 (round trip) × tripMultiplier × quantity × moveRate
                    totalDistanceCm += distance * roundTrip * tripMultiplier * entry.quantity * this.moveRate;
                });
                
                const m = (totalDistanceCm / 100).toFixed(2); // cm to m
                const km = (totalDistanceCm / 100000).toFixed(3); // cm to km
                
                // Calculate time: distance in km / speed (4 km/h) = hours
                const walkingSpeedKmH = 4;
                const hours = (totalDistanceCm / 100000) / walkingSpeedKmH;
                const minutes = Math.round(hours * 60);
                
                let timeStr;
                if (minutes >= 60) {
                    const hrs = Math.floor(minutes / 60);
                    const mins = minutes % 60;
                    timeStr = `${hrs}h ${mins}m`;
                } else {
                    timeStr = `${minutes}m`;
                }
                
                return {
                    m: `${m} m`,
                    km: `${km} km`,
                    time: timeStr
                };
            }
            
            updateEntryCalculation(entryId) {
                const entry = this.moveRateEntries.find(e => e.id === entryId);
                if (!entry) return;
                
                const distances = this.calculateEntryDistance(entry);
                
                const resultMInput = document.getElementById(`result-m-${entryId}`);
                if (resultMInput) {
                    resultMInput.value = distances.m;
                }
                
                const resultKmInput = document.getElementById(`result-km-${entryId}`);
                if (resultKmInput) {
                    resultKmInput.value = distances.km;
                }
                
                const resultTimeInput = document.getElementById(`result-time-${entryId}`);
                if (resultTimeInput) {
                    resultTimeInput.value = distances.time;
                }
                
                this.updateFurniturePanel();
            }
            
            updateAllEntryCalculations() {
                this.moveRateEntries.forEach(entry => {
                    this.updateEntryCalculation(entry.id);
                });
            }
            
            // Furniture Distance Panel Functions
            toggleFurniturePanel() {
                this.furniturePanelVisible = !this.furniturePanelVisible;
                const panel = document.getElementById('furniture-distance-panel');
                const openBtn = document.getElementById('furniture-panel-open-btn');
                if (this.furniturePanelVisible) {
                    panel.classList.remove('hidden');
                    openBtn.classList.remove('visible');
                } else {

                    openBtn.classList.add('visible');

            updateFurniturePanel() {
                const panelBody = document.getElementById('furniture-panel-body');
                if (!panelBody) return;
                
                // Get all linked furniture (furniture with links)
                const linkedFurniture = this.assets.filter(asset => asset.name && asset.links && asset.links.length > 0);
                
                if (linkedFurniture.length === 0) {
                    panelBody.innerHTML = '<div class="panel-empty">No linked furniture found.<br>Add links to furniture to track distances.</div>';
                    return;
                }
                
                // Calculate total distance for each furniture (sum of all its links)
                const furnitureDistances = linkedFurniture.map(furniture => {
                    let totalDistanceCm = 0;
                    
                    // Sum all distances from move rate entries for this furniture
                    this.moveRateEntries.forEach(entry => {
                        if (!entry.furnitureLinks) return;
                        
                        entry.furnitureLinks.forEach(linkRef => {
                            // Check if this link belongs to this furniture
                            if (linkRef.furnitureId !== furniture.id) return;
                            
                            const link = furniture.links[linkRef.linkIndex];
                            if (!link || !link.targetName) return;
                            
                            const linkedAsset = this.assets.find(a => a.name === link.targetName);
                            if (!linkedAsset || this.pathNodes.length === 0) return;
                            
                            const path = this.findShortestPathBetweenFurniture(furniture, linkedAsset);
                            if (!path) return;
                            
                            const distance = this.calculatePathDistance(path);
                            const tripMultiplier = link.multiplier || 2;
                            const roundTrip = 2;
                            
                            totalDistanceCm += distance * roundTrip * tripMultiplier * entry.quantity * this.moveRate;
                        });
                    });
                    
                    const meters = (totalDistanceCm / 100).toFixed(2);
                    const walkingSpeedKmH = 4;
                    const hours = (totalDistanceCm / 100000) / walkingSpeedKmH;
                    const minutes = Math.round(hours * 60);
                    
                    let timeStr;
                    if (minutes >= 60) {
                        const hrs = Math.floor(minutes / 60);
                        const mins = minutes % 60;
                        timeStr = `${hrs}h ${mins}m`;
                    } else {
                        timeStr = `${minutes}m`;
                    }
                    
                    return {
                        furniture: furniture,
                        totalDistanceCm: totalDistanceCm,
                        meters: meters,
                        time: timeStr
                    };
                });
                
                // Sort by total distance (highest first)
                furnitureDistances.sort((a, b) => b.totalDistanceCm - a.totalDistanceCm);
                
                // Calculate grand total
                let grandTotalCm = 0;
                furnitureDistances.forEach(item => {
                    grandTotalCm += item.totalDistanceCm;
                });
                
                const grandTotalMeters = (grandTotalCm / 100).toFixed(2);
                const walkingSpeedKmH = 4;
                const grandTotalHours = (grandTotalCm / 100000) / walkingSpeedKmH;
                const grandTotalMinutes = Math.round(grandTotalHours * 60);
                
                let grandTimeStr;
                if (grandTotalMinutes >= 60) {
                    const hrs = Math.floor(grandTotalMinutes / 60);
                    const mins = grandTotalMinutes % 60;
                    grandTimeStr = `${hrs}h ${mins}m`;
                } else {
                    grandTimeStr = `${grandTotalMinutes}m`;
                }
                
                // Update total section
                const totalSection = document.getElementById('furniture-panel-total');
                const totalDistanceSpan = document.getElementById('panel-total-distance');
                const totalTimeSpan = document.getElementById('panel-total-time');
                
                if (grandTotalCm > 0) {
                    totalSection.style.display = 'block';
                    totalDistanceSpan.textContent = `${grandTotalMeters} m`;
                    totalTimeSpan.textContent = grandTimeStr;
                } else {
                    totalSection.style.display = 'none';
                }
                
                // Render cards
                panelBody.innerHTML = '';
                furnitureDistances.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'furniture-card';
                    if (this.selectedAsset === item.furniture) {
                        card.classList.add('selected');
                    }
                    
                    card.onclick = () => {
                        this.selectedAsset = item.furniture;
                        this.selectedWall = null;
                        this.selectedAssets = [];
                        this.selectedPathSegment = null;
                        this.updateDeleteButton();
                        this.updateFurniturePanel();
                        this.render();
                        this.showPropertyEditor(window.innerWidth / 2, window.innerHeight / 2);
                    };
                    
                    const name = document.createElement('div');
                    name.className = 'furniture-card-name';
                    // Show furniture name and number of links
                    const linkCount = item.furniture.links ? item.furniture.links.length : 0;
                    name.textContent = `${item.furniture.name} (${linkCount} link${linkCount !== 1 ? 's' : ''})`;
                    
                    const stats = document.createElement('div');
                    stats.className = 'furniture-card-stats';
                    
                    const distanceStat = document.createElement('div');
                    distanceStat.className = 'furniture-card-stat';
                    distanceStat.innerHTML = `<span>Distance:</span><span class="furniture-card-stat-value">${item.meters} m</span>`;
                    
                    const timeStat = document.createElement('div');
                    timeStat.className = 'furniture-card-stat';
                    timeStat.innerHTML = `<span>Time:</span><span class="furniture-card-stat-value">${item.time}</span>`;
                    
                    stats.appendChild(distanceStat);
                    stats.appendChild(timeStat);
                    
                    card.appendChild(name);
                    card.appendChild(stats);
                    
                    panelBody.appendChild(card);
                });
            }
        }

        // Initialize the application
        const app = new FloorPlanner();
    </script>

                <div class="property-row" style="margin-bottom: 15px;">

                    <div style="flex: 1;">

                        </label>

                <div class="property-row" id="export-color-option" style="margin-bottom: 15px;">
                    <label style="min-width: 120px;">Color:</label>
                    <div style="flex: 1; display: flex; align-items: center; gap: 10px;">

                            <input type="checkbox" id="export-color-override">

                        <input type="color" id="export-color-value" value="#000000" style="width: 48px; height: 30px; padding: 0; border: 1px solid #ddd; border-radius: 4px; cursor: pointer;">
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="padding: 15px 20px; border-top: 1px solid #ddd; display: flex; justify-content: flex-end; gap: 10px;">
                <button id="export-modal-cancel" style="padding: 8px 20px; background: #6c757d; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;">Cancel</button>
